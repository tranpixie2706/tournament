<title>Event Guest Manager</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

</head>
<body><div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useRef,useEffect}=React;

/* ══ Icons ══ */
const Ic=({d,size=16})=><svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{d}</svg>;
const IPlus=({s=16})=><Ic size={s} d={<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>}/>;
const ITrash=({s=16})=><Ic size={s} d={<><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m3-3h8"/></>}/>;
const IEdit=({s=16})=><Ic size={s} d={<><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5z"/></>}/>;
const IX=({s=16})=><Ic size={s} d={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>}/>;
const IUsers=({s=16})=><Ic size={s} d={<><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></>}/>;
const IDollar=({s=16})=><Ic size={s} d={<><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 1 0 0 7h5a3.5 3.5 0 1 1 0 7H6"/></>}/>;
const IAlert=({s=16})=><Ic size={s} d={<><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>}/>;
const IBan=({s=16})=><Ic size={s} d={<><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></>}/>;
const IClock=({s=16})=><Ic size={s} d={<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>}/>;
const ISearch=({s=16})=><Ic size={s} d={<><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>}/>;
const IGear=({s=16})=><Ic size={s} d={<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></>}/>;
const ISave=({s=16})=><Ic size={s} d={<><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></>}/>;
const IDL=({s=16})=><Ic size={s} d={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>}/>;
const IBulk=({s=16})=><Ic size={s} d={<><path d="M11 12H3M16 6H3M16 18H3M18 9v6M21 12h-6"/></>}/>;
const ICheck=({s=16})=><Ic size={s} d={<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>}/>;
const IGrid=({s=16})=><Ic size={s} d={<><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></>}/>;
const ITrophy=({s=16})=><Ic size={s} d={<><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/></>}/>;
const ICloud=({s=16})=><Ic size={s} d={<><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></>}/>;
const IRefresh=({s=16})=><Ic size={s} d={<><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/></>}/>;

/* ══ Constants ══ */
const FEE={PAID:"paid",FREE:"free",UNPAID:"unpaid"};
const ST={NORMAL:"normal",CANCEL:"cancel",WAITING:"waiting"};
const FEE_LBL={paid:"Paid",free:"Free",unpaid:"Unpaid"};
const ST_LBL={normal:"Normal",cancel:"Cancelled",waiting:"Waiting"};
const FEE_CLS={paid:"b-paid",free:"b-free",unpaid:"b-unpaid"};
const ST_CLS={normal:"b-normal",cancel:"b-cancel",waiting:"b-waiting"};

const RANK_OPTS=[
  {v:"champion",l:"Champion"},
  {v:"runner1",l:"Runner-up 1"},
  {v:"runner2",l:"Runner-up 2"},
  {v:"place4",l:"4th Place"},
  {v:"place5",l:"5th Place"},
  {v:"place6",l:"6th Place"},
  {v:"place7",l:"7th Place"},
  {v:"place8",l:"8th Place"},
  {v:"place9",l:"9th Place"},
];
const RANK_SORT={champion:1,runner1:2,runner2:3,place4:4,place5:5,place6:6,place7:7,place8:8,place9:9};
const RANK_MEDAL={champion:"🥇",runner1:"🥈",runner2:"🥉"};

/* ══ Storage ══ */
const LS={GUESTS:"egm4_guests",ROUNDS:"egm4_rounds",FEE:"egm4_fee",DIR:"egm4_dir",EVENT:"egm4_event",BIN_ID:"egm4_bin",API_KEY:"egm4_key",FINAL:"egm4_final"};
function lsGet(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

/* ══ Helpers ══ */
let _uid=Date.now();
function uid(){return String(++_uid);}
function cx(...a){return a.filter(Boolean).join(" ");}
function fmtUSD(n){return "$"+Number(n||0).toLocaleString("en-US");}
function fmtPrize(v){if(!v)return"";const n=Number(String(v).replace(/[^0-9.]/g,""));return isNaN(n)?String(v):"$"+n.toLocaleString("en-US");}
function debounce(fn,ms){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);};}

function sortGuests(guests,rounds){
  const ro={};rounds.forEach((r,i)=>ro[r.id]=i);
  return [...guests].sort((a,b)=>{
    const rank=g=>g.status==="normal"&&g.round?0:g.status==="normal"?1:g.status==="waiting"?2:3;
    const ra=rank(a),rb=rank(b);
    if(ra!==rb)return ra-rb;
    if(ra===0){const d=(ro[a.round]??99)-(ro[b.round]??99);if(d)return d;}
    return a.memberId.localeCompare(b.memberId,undefined,{numeric:true});
  });
}

function dlCSV(name,rows){
  const csv=rows.map(r=>r.map(c=>{const s=String(c??"");return(s.includes(",")||s.includes('"'))?'"'+s.replace(/"/g,'""')+'"':s;}).join(",")).join("\n");
  const b=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  const u=URL.createObjectURL(b);const a=document.createElement("a");
  a.href=u;a.download=name;document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(u);
}

/* ══ JSONBin sync ══ */
async function jbRead(binId,apiKey){
  const res=await fetch("https://api.jsonbin.io/v3/b/"+binId+"/latest",{
    method:"GET",headers:{"X-Master-Key":apiKey,"X-Bin-Meta":"false"}
  });
  if(!res.ok)throw new Error("HTTP "+res.status);
  return res.json();
}
async function jbWrite(binId,apiKey,payload){
  const res=await fetch("https://api.jsonbin.io/v3/b/"+binId,{
    method:"PUT",
    headers:{"Content-Type":"application/json","X-Master-Key":apiKey},
    body:JSON.stringify(payload)
  });
  if(!res.ok)throw new Error("HTTP "+res.status);
  return res.json();
}

/* ══════════════════════════════════════
   APP
══════════════════════════════════════ */
function App(){
  const [guests,setGuests]   =useState(()=>lsGet(LS.GUESTS,[]));
  const [rounds,setRounds]   =useState(()=>lsGet(LS.ROUNDS,[{id:"r1",name:"Round 1",limit:20},{id:"r2",name:"Round 2",limit:20}]));
  const [final,setFinal]     =useState(()=>lsGet(LS.FINAL,{enabled:false,name:"Final",entries:[]}));
  const [feeAmt,setFeeAmt]   =useState(()=>lsGet(LS.FEE,50));
  const [eventName,setEventName]=useState(()=>lsGet(LS.EVENT,""));
  const [binId,setBinId]     =useState(()=>lsGet(LS.BIN_ID,""));
  const [apiKey,setApiKey]   =useState(()=>lsGet(LS.API_KEY,""));
  const [syncing,setSyncing] =useState(false);
  const [syncMsg,setSyncMsg] =useState("");
  const [tab,setTab]         =useState("overview");
  const [filterTab,setFilterTab]=useState("all");
  const [search,setSearch]   =useState("");
  const [roundSearch,setRoundSearch]=useState("");
  const [showForm,setShowForm]=useState(false);
  const [showBulk,setShowBulk]=useState(false);
  const [editEid,setEditEid] =useState(null);
  const [formErr,setFormErr] =useState("");
  const [form,setForm]       =useState(emptyForm());
  const dirRef               =useRef(lsGet(LS.DIR,[]));
  const [dirVer,setDirVer]   =useState(0);

  /* Persist */
  useEffect(()=>lsSet(LS.GUESTS,guests),[guests]);
  useEffect(()=>lsSet(LS.ROUNDS,rounds),[rounds]);
  useEffect(()=>lsSet(LS.FEE,feeAmt),[feeAmt]);
  useEffect(()=>lsSet(LS.EVENT,eventName),[eventName]);
  useEffect(()=>lsSet(LS.BIN_ID,binId),[binId]);
  useEffect(()=>lsSet(LS.API_KEY,apiKey),[apiKey]);
  useEffect(()=>lsSet(LS.FINAL,final),[final]);

  /* Auto-pull on open */
  useEffect(()=>{
    if(binId&&apiKey){
      jbRead(binId,apiKey).then(data=>{
        if(data){applyCloud(data);}
      }).catch(()=>{});
    }
  },[]);

  function applyCloud(data){
    if(data.guests)setGuests(data.guests);
    if(data.rounds)setRounds(data.rounds);
    if(data.final)setFinal(data.final);
    if(data.feeAmt!=null)setFeeAmt(data.feeAmt);
    if(data.eventName)setEventName(data.eventName);
  }

  function emptyForm(){return{memberId:"",name:"",tier:"",feeStatus:"unpaid",round:"",status:"normal",note:""};}

  const dirMap=useMemo(()=>{
    const m={};dirRef.current.forEach(d=>m[d.id]={name:d.name,tier:d.tier||""});return m;
  },[dirVer]);

  /* Sync */
  async function pushCloud(){
    if(!binId||!apiKey){setSyncMsg("⚠️ Set Bin ID & API Key in Settings");return;}
    setSyncing(true);setSyncMsg("Saving…");
    try{
      await jbWrite(binId,apiKey,{guests,rounds,final,feeAmt,eventName,savedAt:new Date().toISOString()});
      setSyncMsg("✓ Saved");
    }catch(e){setSyncMsg("✗ "+e.message);}
    setSyncing(false);setTimeout(()=>setSyncMsg(""),4000);
  }
  async function pullCloud(){
    if(!binId||!apiKey){setSyncMsg("⚠️ Set Bin ID & API Key in Settings");return;}
    setSyncing(true);setSyncMsg("Loading…");
    try{
      const data=await jbRead(binId,apiKey);
      applyCloud(data);
      setSyncMsg("✓ Loaded");
    }catch(e){setSyncMsg("✗ "+e.message);}
    setSyncing(false);setTimeout(()=>setSyncMsg(""),4000);
  }

  /* Derived */
  const roundCounts=useMemo(()=>{
    const m={};rounds.forEach(r=>m[r.id]=0);
    guests.forEach(g=>{if(g.status==="normal"&&g.round&&m[g.round]!==undefined)m[g.round]++;});
    return m;
  },[guests,rounds]);

  const stats=useMemo(()=>{
    const active=guests.filter(g=>g.status==="normal");
    const paid=active.filter(g=>g.feeStatus==="paid");
    const free=active.filter(g=>g.feeStatus==="free");
    const unpaid=active.filter(g=>g.feeStatus==="unpaid");
    const assigned=active.filter(g=>g.round);
    const unassigned=active.filter(g=>!g.round);
    const cancelled=guests.filter(g=>g.status==="cancel");
    const waiting=guests.filter(g=>g.status==="waiting");
    return{total:guests.length,active:active.length,paid,free,unpaid,assigned,unassigned,cancelled,waiting,collected:paid.length*feeAmt};
  },[guests,feeAmt]);

  const sorted=useMemo(()=>sortGuests(guests,rounds),[guests,rounds]);

  const displayed=useMemo(()=>{
    const q=search.trim().toLowerCase();
    const base={all:sorted,paid:stats.paid,free:stats.free,unpaid:stats.unpaid,assigned:stats.assigned,unassigned:stats.unassigned,cancelled:stats.cancelled,waiting:stats.waiting}[filterTab]||sorted;
    if(!q)return base;
    return base.filter(g=>g.memberId.toLowerCase().includes(q)||g.name.toLowerCase().includes(q)||(g.note||"").toLowerCase().includes(q));
  },[sorted,stats,filterTab,search]);

  const roundSearchRes=useMemo(()=>{
    const q=roundSearch.trim().toLowerCase();
    if(!q)return null;
    return guests.filter(g=>g.status==="normal"&&g.round&&(g.memberId.toLowerCase().includes(q)||g.name.toLowerCase().includes(q)));
  },[guests,roundSearch]);

  /* Guest actions */
  function startAdd(){setForm(emptyForm());setEditEid(null);setFormErr("");setShowForm(true);}
  function startEdit(g){setForm({memberId:g.memberId,name:g.name,tier:g.tier||"",feeStatus:g.feeStatus,round:g.round,status:g.status,note:g.note});setEditEid(g.eid);setFormErr("");setShowForm(true);}

  function roundFull(rid,excl){
    const r=rounds.find(r=>r.id===rid);if(!r)return false;
    return guests.filter(g=>g.round===rid&&g.status==="normal"&&g.eid!==excl).length>=r.limit;
  }
  function memberInRound(mid,rid,excl){return guests.some(g=>g.memberId===mid&&g.round===rid&&g.status==="normal"&&g.eid!==excl);}

  function onIdChange(id){
    const e=dirMap[id.trim()];
    setForm(f=>({...f,memberId:id,name:e?.name||f.name,tier:e?.tier||f.tier}));
  }

  function saveGuest(){
    const mid=form.memberId.trim(),name=form.name.trim();
    if(!mid)return setFormErr("Enter a Member ID.");
    if(!name)return setFormErr("Enter a name.");
    if(form.status==="normal"&&form.round){
      if(roundFull(form.round,editEid)){const r=rounds.find(r=>r.id===form.round);return setFormErr(r.name+" is full.");}
      if(memberInRound(mid,form.round,editEid))return setFormErr(mid+" is already in this round.");
    }
    const g={eid:editEid||uid(),memberId:mid,name,tier:form.tier.trim(),feeStatus:form.feeStatus,round:form.status==="normal"?form.round:"",status:form.status,note:form.note.trim()};
    if(editEid)setGuests(p=>p.map(x=>x.eid===editEid?g:x));
    else setGuests(p=>[...p,g]);
    setShowForm(false);setFormErr("");
  }

  function delGuest(eid){if(confirm("Delete this entry?"))setGuests(p=>p.filter(g=>g.eid!==eid));}
  function upd(eid,patch){setGuests(p=>p.map(g=>g.eid===eid?{...g,...patch}:g));}
  function tryRound(eid,rid){
    const g=guests.find(x=>x.eid===eid);if(!g)return false;
    if(rid){
      if(roundFull(rid,eid)){alert(rounds.find(r=>r.id===rid)?.name+" is full.");return false;}
      if(memberInRound(g.memberId,rid,eid)){alert(g.memberId+" already in this round.");return false;}
    }
    upd(eid,{round:rid,status:"normal"});return true;
  }
  function setSt(eid,status){const g=guests.find(x=>x.eid===eid);upd(eid,{status,round:status==="normal"?g?.round:""});}

  function exportCSV(){
    const rn=id=>rounds.find(r=>r.id===id)?.name||"";
    dlCSV((eventName||"event")+"-"+new Date().toISOString().slice(0,10)+".csv",
      [["#","Member ID","Name","Tier","Fee","Round","Status","Note"],
       ...sorted.map((g,i)=>[i+1,g.memberId,g.name,g.tier||"",FEE_LBL[g.feeStatus],g.round?rn(g.round):"",ST_LBL[g.status],g.note||""])]);
  }

  function bulkAdd(lines){
    setGuests(p=>[...p,...lines.filter(id=>id.trim()).map(rawId=>{
      const id=rawId.trim();const e=dirMap[id];
      return{eid:uid(),memberId:id,name:e?.name||"(Unknown)",tier:e?.tier||"",feeStatus:"unpaid",round:"",status:"normal",note:""};
    })]);
    setShowBulk(false);
  }

  const tp={rounds,onEdit:startEdit,onAssign:tryRound,onStatus:setSt,onFee:(eid,fs)=>upd(eid,{feeStatus:fs})};

  const FTABS=[["all","All",stats.total],["paid","Paid",stats.paid.length],["free","Free",stats.free.length],["unpaid","Unpaid",stats.unpaid.length],["assigned","Assigned",stats.assigned.length],["unassigned","Unassigned",stats.unassigned.length],["cancelled","Cancelled",stats.cancelled.length],["waiting","Waiting",stats.waiting.length]];

  return(
    <div className="app">
      <style>{CSS}</style>

      <header className="topbar">
        <div className="brand">
          <div className="bmark">E</div>
          <div>
            <div className="btitle">{eventName||"Event Guest Manager"}</div>
            <div className="bsub">
              {stats.total} entries · {stats.active} active
              {syncMsg&&<span className={cx("smsg",syncMsg.startsWith("✓")?"smsg-ok":syncMsg.startsWith("✗")?"smsg-err":"smsg-warn")}>{syncMsg}</span>}
            </div>
          </div>
        </div>
        <div className="hacts">
          {binId&&apiKey&&<>
            <button className="btn btn-ghost btn-xs" onClick={pullCloud} disabled={syncing} title="Pull latest"><IRefresh s={13}/></button>
            <button className="btn btn-ghost btn-xs" onClick={pushCloud} disabled={syncing} title="Push / save"><ICloud s={13}/></button>
          </>}
          <button className="btn btn-ghost btn-xs" onClick={exportCSV}><IDL s={13}/></button>
          <button className="btn btn-sec btn-xs" onClick={()=>setShowBulk(true)}><IBulk s={13}/> Bulk</button>
          <button className="btn btn-pri btn-xs" onClick={startAdd}><IPlus s={13}/> Add</button>
        </div>
      </header>

      <nav className="tabs">
        {[["overview","Overview",<IGrid s={13}/>],["rounds","Rounds",<IUsers s={13}/>],["final","Final",<ITrophy s={13}/>],["settings","Settings",<IGear s={13}/>]].map(([id,lbl,icon])=>(
          <button key={id} className={cx("tab",tab===id&&"tab-on")} onClick={()=>setTab(id)}>{icon}{lbl}</button>
        ))}
      </nav>

      <main className="content">

        {tab==="overview"&&<div className="stack">
          <div className="sgrid">
            <SC icon={<IUsers s={17}/>} label="Total" value={stats.total}/>
            <SC icon={<ICheck s={17}/>} label="Assigned" value={stats.assigned.length} sub={"of "+stats.active}/>
            <SC icon={<IDollar s={17}/>} label="Collected" value={fmtUSD(stats.collected)} sub={stats.paid.length+" paid"} tone="good"/>
            <SC icon={<IDollar s={17}/>} label="Free" value={stats.free.length}/>
            <SC icon={<IAlert s={17}/>} label="Unpaid" value={stats.unpaid.length} tone={stats.unpaid.length>0?"warn":"def"}/>
            <SC icon={<IClock s={17}/>} label="Unassigned" value={stats.unassigned.length} tone={stats.unassigned.length>0?"warn":"def"}/>
            <SC icon={<IBan s={17}/>} label="Cancelled" value={stats.cancelled.length} tone="danger"/>
            <SC icon={<IClock s={17}/>} label="Waiting" value={stats.waiting.length} tone="neutral"/>
          </div>
          <div className="panel">
            <div className="panel-hdr" style={{flexDirection:"column",alignItems:"stretch",gap:8}}>
              <div className="ftabs">
                {FTABS.map(([id,lbl,cnt])=>(
                  <button key={id} className={cx("ftab",filterTab===id&&"ftab-on")} onClick={()=>setFilterTab(id)}>
                    {lbl}<span className="ftab-cnt">{cnt}</span>
                  </button>
                ))}
              </div>
              <div className="sbox">
                <ISearch s={13}/>
                <input placeholder="Search ID, name, note…" value={search} onChange={e=>setSearch(e.target.value)}/>
                {search&&<button className="sclear" onClick={()=>setSearch("")}><IX s={12}/></button>}
              </div>
            </div>
            <GuestTable guests={displayed} onDel={delGuest} {...tp}/>
          </div>
        </div>}

        {tab==="rounds"&&<div className="stack">
          <div className="sbox sbox-wide">
            <ISearch s={13}/>
            <input placeholder="Search across all rounds…" value={roundSearch} onChange={e=>setRoundSearch(e.target.value)}/>
            {roundSearch&&<button className="sclear" onClick={()=>setRoundSearch("")}><IX s={12}/></button>}
          </div>
          {roundSearchRes?(
            <div className="panel">
              <div className="panel-hdr"><h2>Results <span className="dim">({roundSearchRes.length})</span></h2></div>
              <GuestTable guests={roundSearchRes} onDel={()=>{}} hideStatus {...tp}/>
            </div>
          ):rounds.length===0?<div className="empty">No rounds yet. Go to Settings.</div>
          :rounds.map(r=>{
            const rg=guests.filter(g=>g.status==="normal"&&g.round===r.id).sort((a,b)=>a.memberId.localeCompare(b.memberId,undefined,{numeric:true}));
            const cnt=roundCounts[r.id]||0;
            return(
              <div className="panel" key={r.id}>
                <div className="panel-hdr">
                  <h2>{r.name} <span className="dim">({cnt}/{r.limit})</span></h2>
                  {cnt>=r.limit&&<span className="badge b-unpaid">Full</span>}
                </div>
                <GuestTable guests={rg} onDel={()=>{}} hideRound hideStatus {...tp}/>
              </div>
            );
          })}
        </div>}

        {tab==="final"&&<FinalTab final={final} setFinal={setFinal} guests={guests}/>}

        {tab==="settings"&&<SettingsTab
          rounds={rounds} setRounds={setRounds}
          feeAmt={feeAmt} setFeeAmt={setFeeAmt}
          eventName={eventName} setEventName={setEventName}
          binId={binId} setBinId={setBinId}
          apiKey={apiKey} setApiKey={setApiKey}
          syncing={syncing} onPush={pushCloud} onPull={pullCloud}
          roundCounts={roundCounts}
          dirRef={dirRef} dirVer={dirVer} setDirVer={setDirVer}
        />}
      </main>

      {showForm&&<GuestModal form={form} setForm={setForm} rounds={rounds} err={formErr}
        isEdit={!!editEid} onClose={()=>{setShowForm(false);setFormErr("");}}
        onSave={saveGuest} onIdChange={onIdChange}/>}
      {showBulk&&<BulkModal onClose={()=>setShowBulk(false)} onSubmit={bulkAdd} dirMap={dirMap}/>}
    </div>
  );
}

/* ══ Popover ══ */
function Pop({anchorRef,onClose,children}){
  const ref=useRef(null);
  const [mobile,setMobile]=useState(()=>window.innerWidth<640);
  useEffect(()=>{
    const chk=()=>setMobile(window.innerWidth<640);
    window.addEventListener("resize",chk);
    return()=>window.removeEventListener("resize",chk);
  },[]);
  useEffect(()=>{
    if(mobile)return; // desktop only: close on outside click
    const fn=e=>{if(ref.current&&!ref.current.contains(e.target)&&!anchorRef?.current?.contains(e.target))onClose();};
    document.addEventListener("mousedown",fn);
    return()=>document.removeEventListener("mousedown",fn);
  },[onClose,mobile]);

  if(mobile){
    // Full-screen overlay + bottom sheet — always visible, nothing cut off
    return(
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:999,display:"flex",flexDirection:"column",justifyContent:"flex-end"}}
        onMouseDown={e=>{if(e.target===e.currentTarget)onClose();}}>
        <div ref={ref} style={{background:"#fff",borderRadius:"18px 18px 0 0",paddingBottom:"env(safe-area-inset-bottom,16px)",maxHeight:"70vh",overflowY:"auto"}}>
          <div style={{width:36,height:4,background:"#ddd",borderRadius:2,margin:"12px auto 6px"}}/>
          {children}
          <button onClick={onClose} style={{display:"block",width:"calc(100% - 28px)",margin:"8px 14px 4px",padding:"13px",background:"#f3e1d4",color:"#b55327",border:"none",borderRadius:10,fontSize:15,fontWeight:700,fontFamily:"inherit",cursor:"pointer"}}>
            Cancel
          </button>
        </div>
      </div>
    );
  }
  return <div className="pop-drop" ref={ref}>{children}</div>;
}

/* ══ Final Tab ══
   Phase 1 (Setup): define prize table — RANK + PRIZE per row, saved in final.prizeSetup
   Phase 2 (Entry): each row shows RANK+PRIZE (read-only) + MB# input only
══ */
function FinalTab({final,setFinal,guests}){
  const prizeSetup = final.prizeSetup || [];   // [{rank, prize}]  — configured once
  const results    = final.results    || {};    // {rank: {memberId, name}}
  const [editSetup,setEditSetup]=useState(false);
  const [newRank,setNewRank]=useState("champion");
  const [newPrize,setNewPrize]=useState("");
  const [setupErr,setSetupErr]=useState("");

  function resolveGuest(id){return guests.find(g=>g.memberId===id.trim()&&g.status==="normal")||null;}
  function resolveName(id){return resolveGuest(id)?.name||"";}
  function resolveTier(id){return resolveGuest(id)?.tier||"";}

  // ── Setup phase: add a rank+prize row ──
  const usedSetupRanks=new Set(prizeSetup.map(p=>p.rank));
  function addPrizeRow(){
    if(usedSetupRanks.has(newRank))return setSetupErr(RANK_OPTS.find(o=>o.v===newRank)?.l+" already added.");
    setFinal(f=>({...f,prizeSetup:[...(f.prizeSetup||[]),{rank:newRank,prize:newPrize.trim()}]}));
    // find next unused rank
    const next=RANK_OPTS.find(o=>!usedSetupRanks.has(o.v)&&o.v!==newRank);
    setNewRank(next?.v||"champion");
    setNewPrize("");setSetupErr("");
  }
  function delPrizeRow(rank){
    setFinal(f=>({
      ...f,
      prizeSetup:(f.prizeSetup||[]).filter(p=>p.rank!==rank),
      results:Object.fromEntries(Object.entries(f.results||{}).filter(([r])=>r!==rank))
    }));
  }
  function updPrize(rank,prize){
    setFinal(f=>({...f,prizeSetup:(f.prizeSetup||[]).map(p=>p.rank===rank?{...p,prize}:p)}));
  }

  // ── Entry phase: assign MB# to each rank ──
  function setMb(rank,mbId){
    const name=resolveName(mbId);
    setFinal(f=>({...f,results:{...(f.results||{}),[rank]:{memberId:mbId,name}}}));
  }

  const sortedSetup=[...prizeSetup].sort((a,b)=>(RANK_SORT[a.rank]||99)-(RANK_SORT[b.rank]||99));

  const MEDAL={champion:"🥇",runner1:"🥈",runner2:"🥉"};
  const rankLabel=v=>RANK_OPTS.find(o=>o.v===v)?.l||v;

  return(
    <div className="stack">
      {/* Toggle */}
      <div className="panel">
        <div className="panel-hdr">
          <h2><ITrophy s={15}/> Final Round</h2>
          <label className="toggle">
            <input type="checkbox" checked={!!final.enabled} onChange={()=>setFinal(f=>({...f,enabled:!f.enabled}))}/>
            <span className="tslider"/><span className="tlbl">{final.enabled?"Active":"Disabled"}</span>
          </label>
        </div>
        {!final.enabled&&<p className="hint">Enable to configure prize table and record results.</p>}
      </div>

      {final.enabled&&<>

        {/* ── PHASE 1: Prize Setup ── */}
        <div className="panel">
          <div className="panel-hdr">
            <h2>Prize setup</h2>
            <button className="btn btn-ghost btn-xs" onClick={()=>setEditSetup(e=>!e)}>
              {editSetup?"Done editing":"Edit"}
            </button>
          </div>

          {/* Table header */}
          <div className="fsetup-hdr">
            <div className="fsetup-col-rank">FINAL RESULT</div>
            <div className="fsetup-col-prize">PRIZE</div>
          </div>

          {sortedSetup.length===0&&!editSetup&&(
            <p className="hint">No prizes set up yet. Click "Edit" to add ranks and prizes.</p>
          )}

          {sortedSetup.map(p=>(
            <div className="fsetup-row" key={p.rank}>
              <div className="fsetup-col-rank">
                <span className="fsetup-medal">{MEDAL[p.rank]||""}</span>
                <span className="fsetup-rank-lbl">{rankLabel(p.rank)}</span>
              </div>
              <div className="fsetup-col-prize">
                {editSetup
                  ? <div className="fee-wrap" style={{width:130}}>
                      <span className="fee-pre">$</span>
                      <input className="input fee-inp" value={p.prize} onChange={e=>updPrize(p.rank,e.target.value)} style={{width:90}}/>
                    </div>
                  : <span className="fsetup-prize-lbl">{p.prize?"$"+Number(String(p.prize).replace(/[^0-9.]/g,"")).toLocaleString("en-US"):""}</span>
                }
              </div>
              {editSetup&&<button className="ib ib-d" onClick={()=>delPrizeRow(p.rank)}><ITrash s={12}/></button>}
            </div>
          ))}

          {editSetup&&(
            <div className="fsetup-add">
              {setupErr&&<div className="ferr ferr-sm"><IAlert s={12}/>{setupErr}</div>}
              <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"flex-end"}}>
                <div className="field" style={{flex:1,minWidth:130}}>
                  <label>Rank</label>
                  <select className="input" value={newRank} onChange={e=>setNewRank(e.target.value)}>
                    {RANK_OPTS.map(o=>(
                      <option key={o.v} value={o.v} disabled={usedSetupRanks.has(o.v)}>
                        {o.l}{usedSetupRanks.has(o.v)?" ✓":""}
                      </option>
                    ))}
                  </select>
                </div>
                <div className="field" style={{flex:1,minWidth:110}}>
                  <label>Prize (USD)</label>
                  <div className="fee-wrap"><span className="fee-pre">$</span><input className="input fee-inp" placeholder="10,000" value={newPrize} onChange={e=>setNewPrize(e.target.value)}/></div>
                </div>
                <button className="btn btn-pri btn-xs" style={{marginBottom:1}} onClick={addPrizeRow}><IPlus s={13}/> Add</button>
              </div>
            </div>
          )}
        </div>

        {/* ── PHASE 2: Enter MB# only ── */}
        {sortedSetup.length>0&&(
          <div className="panel">
            <div className="panel-hdr"><h2>Enter results — MB# only</h2></div>
            <div className="fentry-hdr">
              <div className="fentry-c1">FINAL RESULT</div>
              <div className="fentry-c2">PRIZE</div>
              <div className="fentry-c3">MB#</div>
              <div className="fentry-c4">NAME</div>
              <div className="fentry-c5">TIER</div>
            </div>
            {sortedSetup.map(p=>{
              const r=results[p.rank]||{memberId:"",name:""};
              const resolved=r.memberId?resolveName(r.memberId):"";
              return(
                <div className="fentry-row" key={p.rank}>
                  <div className="fentry-c1">
                    <span className="fsetup-medal">{MEDAL[p.rank]||""}</span>
                    <span className="fentry-rank-lbl">{rankLabel(p.rank)}</span>
                  </div>
                  <div className="fentry-c2">
                    <span className="fsetup-prize-lbl">{p.prize?"$"+Number(String(p.prize).replace(/[^0-9.]/g,"")).toLocaleString("en-US"):""}</span>
                  </div>
                  <div className="fentry-c3">
                    <input className="input fentry-mb" value={r.memberId}
                      placeholder="MB#"
                      onChange={e=>setMb(p.rank,e.target.value)}/>
                  </div>
                  <div className="fentry-c4 namec">
                    {resolved||r.name||<span className="dim">—</span>}
                  </div>
                  <div className="fentry-c5">
                    {resolveTier(r.memberId)?<span className="tbadge">{resolveTier(r.memberId)}</span>:<span className="dim">—</span>}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* ── Prize board (display card) ── */}
        {sortedSetup.some(p=>results[p.rank]?.memberId)&&(
          <div className="panel">
            <div className="panel-hdr"><h2>Prize board</h2></div>
            <div className="prize-card">
              <div className="prize-card-title">{final.name||"Final Results"}</div>
              {sortedSetup.map(p=>{
                const r=results[p.rank];
                if(!r?.memberId)return null;
                const name=resolveName(r.memberId)||r.name||"—";
                const prize=p.prize?"$"+Number(String(p.prize).replace(/[^0-9.]/g,"")).toLocaleString("en-US"):"";
                return(
                  <div className="pcr" key={p.rank}>
                    <div className="pcr-left">
                      <span className="pcr-medal">{MEDAL[p.rank]||""}</span>
                      <div>
                        <div className="pcr-mb">{r.memberId}</div>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <div className="pcr-name">{name}</div>
                          {resolveTier(r.memberId)&&<span className="tbadge" style={{fontSize:10}}>{resolveTier(r.memberId)}</span>}
                        </div>
                        <div className="pcr-rank">{rankLabel(p.rank)}</div>
                      </div>
                    </div>
                    {prize&&<div className="pcr-prize">{prize}</div>}
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </>}
    </div>
  );
}

/* ══ Settings Tab ══ */
const DPAGE=50;
function SettingsTab({rounds,setRounds,feeAmt,setFeeAmt,eventName,setEventName,binId,setBinId,apiKey,setApiKey,syncing,onPush,onPull,roundCounts,dirRef,dirVer,setDirVer}){
  const [df,setDf]=useState({id:"",name:"",tier:""});
  const [dfErr,setDfErr]=useState("");
  const [bulk,setBulk]=useState("");
  const [dsearch,setDsearch]=useState("");
  const [dpage,setDpage]=useState(0);
  const dbSearch=useRef(debounce(v=>{setDsearch(v);setDpage(0);},250));
  /* local cred state so typing doesn't re-render parent */
  const [lBin,setLBin]=useState(binId||"");
  const [lKey,setLKey]=useState(apiKey||"");
  const [credSaved,setCredSaved]=useState(!!(binId&&apiKey));

  const dir=dirRef.current;
  const dirFilt=useMemo(()=>{
    const q=dsearch.trim().toLowerCase();
    if(!q)return dir;
    return dir.filter(d=>d.id.toLowerCase().includes(q)||d.name.toLowerCase().includes(q)||(d.tier||"").toLowerCase().includes(q));
  },[dirVer,dsearch]);
  const dItems=useMemo(()=>dirFilt.slice(dpage*DPAGE,(dpage+1)*DPAGE),[dirFilt,dpage]);
  const dPages=Math.ceil(dirFilt.length/DPAGE);

  function saveCreds(){
    const b=lBin.trim(),k=lKey.trim();
    if(!b||!k){alert("Enter both Bin ID and API Key.");return;}
    setBinId(b);setApiKey(k);
    lsSet(LS.BIN_ID,b);lsSet(LS.API_KEY,k);
    setCredSaved(true);
  }

  function addEntry(){
    const id=df.id.trim(),name=df.name.trim();
    if(!id||!name)return setDfErr("Enter ID and name.");
    if(dir.some(d=>d.id===id))return setDfErr(id+" already exists.");
    dirRef.current=[...dir,{id,name,tier:df.tier.trim()}];
    lsSet(LS.DIR,dirRef.current);setDirVer(v=>v+1);
    setDf({id:"",name:"",tier:""});setDfErr("");
  }
  function delEntry(id){dirRef.current=dir.filter(d=>d.id!==id);lsSet(LS.DIR,dirRef.current);setDirVer(v=>v+1);}
  function importBulk(){
    const ex=new Set(dir.map(d=>d.id));const adds=[];
    bulk.split("\n").forEach(line=>{
      const p=line.split(",");
      const id=(p[0]||"").trim(),name=(p[1]||"").trim(),tier=(p[2]||"").trim();
      if(!id||!name||ex.has(id))return;ex.add(id);adds.push({id,name,tier});
    });
    if(adds.length){dirRef.current=[...dir,...adds];lsSet(LS.DIR,dirRef.current);setDirVer(v=>v+1);setBulk("");}
  }
  function addRound(){setRounds(p=>[...p,{id:"r_"+Date.now().toString(36).slice(-5),name:"Round "+(p.length+1),limit:20}]);}
  function updRName(id,v){setRounds(p=>p.map(r=>r.id===id?{...r,name:v}:r));}
  function updRLim(id,v){setRounds(p=>p.map(r=>r.id===id?{...r,limit:Math.max(0,v)}:r));}
  function delRound(id){setRounds(p=>p.filter(r=>r.id!==id));}
  function clearAll(){if(confirm("Delete ALL data?")){{Object.values(LS).forEach(k=>localStorage.removeItem(k));window.location.reload();}}}

  return(
    <div className="stack">
      {/* Event */}
      <div className="panel">
        <div className="panel-hdr"><h2>Event</h2></div>
        <div className="srow">
          <label>Event name</label>
          <input className="input" value={eventName} onChange={e=>setEventName(e.target.value)} placeholder="e.g. Poker Night June 2025" style={{maxWidth:260}}/>
        </div>
        <p className="hint">Used in the header and CSV filename.</p>
      </div>

      {/* Sync */}
      <div className="panel">
        <div className="panel-hdr"><h2><ICloud s={14}/> Cloud sync (JSONBin)</h2></div>
        <p className="hint">Sync across devices using <strong>jsonbin.io</strong> (free). <a href="#jbguide" style={{color:"var(--acc)"}}>Setup guide ↓</a></p>
        <div style={{padding:"0 13px 13px",display:"flex",flexDirection:"column",gap:10}}>
          <div className="field">
            <label>Bin ID</label>
            <input className="input" value={lBin} onChange={e=>{setLBin(e.target.value);setCredSaved(false);}}
              placeholder="6a3a03a4da38895dfeef4942"
              autoComplete="off" autoCorrect="off" autoCapitalize="off" spellCheck="false"/>
          </div>
          <div className="field">
            <label>API Key (Master Key)</label>
            <input className="input" value={lKey} onChange={e=>{setLKey(e.target.value);setCredSaved(false);}}
              placeholder="Paste Master Key here"
              autoComplete="off" autoCorrect="off" autoCapitalize="off" spellCheck="false"/>
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
            {!credSaved
              ? <button className="btn btn-pri btn-xs" onClick={saveCreds}><ISave s={13}/> Save credentials</button>
              : <>
                  <span style={{fontSize:12,color:"var(--good)",fontWeight:600}}>✓ Credentials saved</span>
                  <button className="btn btn-sec btn-xs" onClick={onPull} disabled={syncing}><IRefresh s={13}/> Pull</button>
                  <button className="btn btn-pri btn-xs" onClick={onPush} disabled={syncing}><ICloud s={13}/> Push</button>
                  <button className="btn btn-ghost btn-xs" onClick={()=>setCredSaved(false)}>Edit</button>
                </>
            }
          </div>
          {credSaved&&<div style={{fontSize:11,color:"var(--ink-s)"}}>
            Bin: <code style={{background:"var(--neu-s)",padding:"1px 5px",borderRadius:4}}>{lBin.slice(0,10)}…</code>
          </div>}
        </div>
        <div className="sheet-guide" id="jbguide">
          <div className="guide-title">📋 Setup (one-time, ~2 min)</div>
          <ol className="guide-steps">
            <li>Go to <a href="https://jsonbin.io" target="_blank" style={{color:"var(--acc)"}}>jsonbin.io</a> → Sign Up (free).</li>
            <li>Top menu → <strong>API Keys</strong> → copy <strong>Secret Key</strong> → paste into API Key above.</li>
            <li>Top menu → <strong>Bins → Create Bin</strong> → enter any valid JSON (e.g. a number like 1) → Save → copy <strong>Bin ID</strong> from URL → paste above.</li>
            <li>Click <strong>Save credentials</strong> then <strong>Push</strong> to upload data.</li>
            <li>On mobile: same Bin ID + API Key → Save → Pull.</li>
          </ol>
        </div>
      </div>

      {/* Fee */}
      <div className="panel">
        <div className="panel-hdr"><h2>Registration fee</h2></div>
        <div className="srow">
          <label>Fee per entry (USD)</label>
          <div className="fee-wrap"><span className="fee-pre">$</span><input type="number" className="input fee-inp" value={feeAmt} min={0} step={1} onChange={e=>setFeeAmt(Number(e.target.value)||0)}/></div>
        </div>
        <p className="hint">Total collected = Paid entries × fee.</p>
      </div>

      {/* Rounds */}
      <div className="panel">
        <div className="panel-hdr"><h2>Rounds</h2><button className="btn btn-sec btn-xs" onClick={addRound}><IPlus s={13}/> Add</button></div>
        <div className="rlist">
          {rounds.map(r=>(
            <div className="rrow" key={r.id}>
              <input className="input rname" value={r.name} onChange={e=>updRName(r.id,e.target.value)}/>
              <div className="rlim"><label>Limit</label><input type="number" className="input rlim-inp" value={r.limit} min={0} onChange={e=>updRLim(r.id,Number(e.target.value)||0)}/></div>
              <div className="rocc dim">{roundCounts[r.id]||0}/{r.limit}</div>
              <button className="ib ib-d" onClick={()=>delRound(r.id)}><ITrash s={13}/></button>
            </div>
          ))}
          {!rounds.length&&<div className="empty">No rounds.</div>}
        </div>
      </div>

      {/* Directory */}
      <div className="panel">
        <div className="panel-hdr"><h2>Member directory <span className="dim">({dir.length})</span></h2></div>
        <p className="hint">ID → Name + Tier. Auto-fills when adding guests.</p>
        <div className="dir-add">
          {dfErr&&<div className="ferr ferr-sm"><IAlert s={13}/>{dfErr}</div>}
          <div className="dir-fields">
            <input className="input" placeholder="ID" value={df.id} onChange={e=>setDf({...df,id:e.target.value})}/>
            <input className="input" placeholder="Name" value={df.name} onChange={e=>setDf({...df,name:e.target.value})}/>
            <input className="input" placeholder="Tier" value={df.tier} onChange={e=>setDf({...df,tier:e.target.value})}/>
            <button className="btn btn-sec btn-xs" onClick={addEntry}><IPlus s={13}/></button>
          </div>
        </div>
        <div className="dir-bulk">
          <div className="bulk-lbl">Bulk import — <code>ID, Name, Tier</code> per line</div>
          <textarea className="input" rows={3} value={bulk} onChange={e=>setBulk(e.target.value)} placeholder={"MB001, Nguyen Van A, Gold\nMB002, Tran Thi B"}/>
          <button className="btn btn-sec btn-xs" style={{alignSelf:"flex-start"}} onClick={importBulk} disabled={!bulk.trim()}><IBulk s={13}/> Import</button>
        </div>
        <div className="dir-search">
          <div className="sbox"><ISearch s={13}/><input placeholder="Search directory…" onChange={e=>dbSearch.current(e.target.value)}/></div>
          <span className="dim">{dirFilt.length} result(s)</span>
        </div>
        <div className="tw">
          {dItems.length===0?<div className="empty">No entries.</div>:(
            <table className="tbl">
              <thead><tr><th>ID</th><th>Name</th><th>Tier</th><th/></tr></thead>
              <tbody>{dItems.map(d=>(
                <tr key={d.id}>
                  <td className="mono">{d.id}</td><td className="namec">{d.name}</td>
                  <td>{d.tier?<span className="tbadge">{d.tier}</span>:<span className="dim">—</span>}</td>
                  <td className="actc"><button className="ib ib-d" onClick={()=>delEntry(d.id)}><ITrash s={13}/></button></td>
                </tr>
              ))}</tbody>
            </table>
          )}
        </div>
        {dPages>1&&<div className="pagination">
          <button className="btn btn-ghost btn-xs" disabled={dpage===0} onClick={()=>setDpage(p=>p-1)}>← Prev</button>
          <span className="dim">{dpage+1}/{dPages}</span>
          <button className="btn btn-ghost btn-xs" disabled={dpage>=dPages-1} onClick={()=>setDpage(p=>p+1)}>Next →</button>
        </div>}
      </div>

      {/* Danger */}
      <div className="panel" style={{borderColor:"#f0cfcc"}}>
        <div className="panel-hdr"><h2 style={{color:"var(--danger)"}}>Danger zone</h2></div>
        <div className="srow">
          <div><div style={{fontWeight:600,fontSize:13}}>Clear all data</div><div className="dim" style={{fontSize:12}}>Permanently delete everything.</div></div>
          <button className="btn btn-xs" style={{background:"var(--danger)",color:"#fff"}} onClick={clearAll}>Clear all</button>
        </div>
      </div>
    </div>
  );
}

/* ══ Guest Modal ══ */
function GuestModal({form,setForm,rounds,err,isEdit,onClose,onSave,onIdChange}){
  return(
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal">
        <div className="modal-hdr"><h3>{isEdit?"Edit entry":"Add guest"}</h3><button className="ib" onClick={onClose}><IX s={16}/></button></div>
        <div className="modal-body">
          {err&&<div className="ferr"><IAlert s={13}/>{err}</div>}
          <div className="fgrid">
            <div className="field"><label>Member ID *</label><input className="input" value={form.memberId} disabled={isEdit} onChange={e=>onIdChange(e.target.value)} placeholder="MB001"/></div>
            <div className="field"><label>Name *</label><input className="input" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Auto-filled"/></div>
            <div className="field"><label>Tier</label><input className="input" value={form.tier} onChange={e=>setForm({...form,tier:e.target.value})}/></div>
            <div className="field"><label>Fee</label>
              <select className="input" value={form.feeStatus} onChange={e=>setForm({...form,feeStatus:e.target.value})}>
                <option value="paid">Paid</option><option value="free">Free</option><option value="unpaid">Unpaid</option>
              </select>
            </div>
            <div className="field"><label>Status</label>
              <select className="input" value={form.status} onChange={e=>setForm({...form,status:e.target.value})}>
                <option value="normal">Normal</option><option value="cancel">Cancelled</option><option value="waiting">Waiting</option>
              </select>
            </div>
            <div className="field"><label>Round</label>
              <select className="input" value={form.round} disabled={form.status!=="normal"} onChange={e=>setForm({...form,round:e.target.value})}>
                <option value="">— Unassigned —</option>
                {rounds.map(r=><option key={r.id} value={r.id}>{r.name}</option>)}
              </select>
            </div>
            <div className="field field-full"><label>Note</label><textarea className="input" rows={2} value={form.note} onChange={e=>setForm({...form,note:e.target.value})} placeholder="Re-join reason, note…"/></div>
          </div>
        </div>
        <div className="modal-ftr">
          <button className="btn btn-ghost btn-xs" onClick={onClose}>Cancel</button>
          <button className="btn btn-pri btn-xs" onClick={onSave}><ISave s={13}/>{isEdit?"Save":"Add"}</button>
        </div>
      </div>
    </div>
  );
}

/* ══ Bulk Modal ══ */
function BulkModal({onClose,onSubmit,dirMap}){
  const [text,setText]=useState("");
  const lines=text.split(/[\n,]/).map(l=>l.trim()).filter(Boolean);
  const prev=lines.slice(0,6);
  return(
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal">
        <div className="modal-hdr"><h3>Bulk add</h3><button className="ib" onClick={onClose}><IX s={16}/></button></div>
        <div className="modal-body">
          <div className="field"><label>Paste IDs — one per line</label><textarea className="input" rows={6} autoFocus value={text} onChange={e=>setText(e.target.value)} placeholder={"MB001\nMB002\nMB003"}/></div>
          <p className="hint">{lines.length} IDs. Names auto-filled from directory. Same ID can appear multiple times (re-join).</p>
          {prev.length>0&&<div className="bprev">
            {prev.map((id,i)=>(
              <div className="brow" key={i}>
                <span className="mono">{id}</span>
                <span className={dirMap[id]?"":"dim"}>{dirMap[id]?.name||"Not in directory"}</span>
                {dirMap[id]?.tier&&<span className="tbadge">{dirMap[id].tier}</span>}
              </div>
            ))}
            {lines.length>6&&<div className="dim" style={{textAlign:"center",fontSize:11}}>+{lines.length-6} more</div>}
          </div>}
        </div>
        <div className="modal-ftr">
          <button className="btn btn-ghost btn-xs" onClick={onClose}>Cancel</button>
          <button className="btn btn-pri btn-xs" disabled={!lines.length} onClick={()=>onSubmit(lines)}><IBulk s={13}/>Add {lines.length||""}</button>
        </div>
      </div>
    </div>
  );
}

.sheet-guide{margin:0 13px 13px;border:1px solid var(--line);border-radius:8px;padding:12px 14px;background:var(--paper);}
.guide-title{font-size:12.5px;font-weight:700;margin-bottom:8px;}
.guide-steps{margin:0 0 0 0;padding-left:18px;font-size:12px;color:var(--ink-s);display:flex;flex-direction:column;gap:5px;}
.guide-steps a{color:var(--acc);}
.guide-steps code{background:var(--neu-s);padding:1px 4px;border-radius:3px;font-size:11px;}
.toggle{display:flex;align-items:center;gap:8px;cursor:pointer;}
.toggle input{display:none;}
.tslider{width:36px;height:20px;background:var(--line);border-radius:10px;position:relative;transition:background .2s;}
.tslider::after{content:"";position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.toggle input:checked+.tslider{background:var(--acc);}
.toggle input:checked+.tslider::after{transform:translateX(16px);}
.tlbl{font-size:12px;font-weight:600;color:var(--ink-s);}
.final-form{display:flex;flex-direction:column;gap:10px;}
@media(min-width:560px){.final-form{flex-direction:row;align-items:flex-start;flex-wrap:wrap;}}
.autofill{font-size:11px;color:var(--good);margin-top:2px;font-weight:600;}
.frr{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);flex-wrap:wrap;}
.frr:last-child{border-bottom:none;}
.frr-rank{display:flex;align-items:center;gap:6px;min-width:130px;padding-top:20px;}
.frr-medal{font-size:20px;}
.frr-rlbl{font-size:12px;font-weight:700;color:var(--ink-s);}
.prize-card{background:linear-gradient(135deg,#1a1410,#2d1f0e);border-radius:10px;padding:16px;display:flex;flex-direction:column;gap:10px;}
.prize-card-title{color:#f0d090;font-size:13px;font-weight:700;text-align:center;letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px;}
.pcr{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 10px;background:rgba(255,255,255,.07);border-radius:7px;}
.pcr-left{display:flex;align-items:center;gap:10px;}
.pcr-medal{font-size:22px;}
.pcr-mb{font-size:11px;color:#aaa;font-family:ui-monospace,monospace;}
.pcr-name{font-size:13px;font-weight:700;color:#fff;}
.pcr-rank{font-size:10.5px;color:#c8a86b;font-weight:600;}
.pcr-prize{font-size:15px;font-weight:700;color:#f0d090;white-space:nowrap;}

/* ── Final setup table ── */
.fsetup-hdr{display:grid;grid-template-columns:1fr 140px;padding:8px 13px;background:var(--paper);border-bottom:1px solid var(--line);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-s);}
.fsetup-row{display:grid;grid-template-columns:1fr 140px auto;align-items:center;padding:10px 13px;border-bottom:1px solid var(--line);gap:8px;}
.fsetup-row:last-child{border-bottom:none;}
.fsetup-col-rank{display:flex;align-items:center;gap:7px;font-weight:700;font-size:13px;}
.fsetup-col-prize{display:flex;align-items:center;}
.fsetup-medal{font-size:20px;line-height:1;}
.fsetup-rank-lbl{color:var(--acc);font-weight:700;font-size:13px;text-transform:uppercase;}
.fsetup-prize-lbl{font-size:14px;font-weight:700;color:var(--good);}
.fsetup-add{padding:12px 13px;border-top:1px solid var(--line);background:var(--paper);}

/* ── Final entry table ── */
.fentry-hdr{display:grid;grid-template-columns:140px 110px 80px 1fr 70px;padding:8px 13px;background:#1a1410;color:#c8a86b;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;}
.fentry-row{display:grid;grid-template-columns:140px 110px 80px 1fr 70px;align-items:center;padding:10px 13px;border-bottom:1px solid var(--line);gap:6px;}
.fentry-row:last-child{border-bottom:none;}
.fentry-c1{display:flex;align-items:center;gap:6px;}
.fentry-c2{color:var(--good);font-weight:700;font-size:13px;}
.fentry-c3{}
.fentry-c4{font-size:13px;color:var(--ink);font-weight:600;} .fentry-c5{display:flex;align-items:center;}
.fentry-rank-lbl{color:var(--acc);font-weight:700;font-size:12px;text-transform:uppercase;}
.fentry-mb{width:82px!important;padding:6px 8px!important;font-size:13px!important;}
@media(max-width:640px){
  .fsetup-hdr,.fsetup-row{grid-template-columns:1fr 110px auto;}
  .fentry-hdr,.fentry-row{grid-template-columns:110px 80px 70px 1fr 60px;}
  .fentry-hdr{font-size:9px;}
  .fentry-mb{width:62px!important;}
}
@media(max-width:400px){
  .fentry-hdr,.fentry-row{grid-template-columns:90px 70px 64px 1fr 52px;padding:8px 8px;gap:4px;}
  .fsetup-rank-lbl,.fentry-rank-lbl{font-size:10.5px;}
  .fentry-mb{width:56px!important;}
}
`;

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
