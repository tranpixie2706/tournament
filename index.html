<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Event Guest Manager</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>html,body,#root{margin:0;padding:0;min-height:100%;}body{background:#f7f6f3;}</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useRef,useEffect,useCallback}=React;

/* ── Icons ── */
const Ic=({d,size=16})=><svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{d}</svg>;
const IPlus=({s=16})=><Ic size={s} d={<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>}/>;
const ITrash=({s=16})=><Ic size={s} d={<><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m3-3h8"/></>}/>;
const IEdit=({s=16})=><Ic size={s} d={<><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5z"/></>}/>;
const IX=({s=16})=><Ic size={s} d={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>}/>;
const IUsers=({s=16})=><Ic size={s} d={<><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></>}/>;
const IDollar=({s=16})=><Ic size={s} d={<><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 1 0 0 7h5a3.5 3.5 0 1 1 0 7H6"/></>}/>;
const IAlert=({s=16})=><Ic size={s} d={<><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>}/>;
const IBan=({s=16})=><Ic size={s} d={<><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></>}/>;
const IClock=({s=16})=><Ic size={s} d={<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>}/>;
const ISearch=({s=16})=><Ic size={s} d={<><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>}/>;
const IGear=({s=16})=><Ic size={s} d={<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></>}/>;
const ISave=({s=16})=><Ic size={s} d={<><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></>}/>;
const IDL=({s=16})=><Ic size={s} d={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>}/>;
const IBulk=({s=16})=><Ic size={s} d={<><path d="M11 12H3M16 6H3M16 18H3M18 9v6M21 12h-6"/></>}/>;
const ICheck=({s=16})=><Ic size={s} d={<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>}/>;
const IGrid=({s=16})=><Ic size={s} d={<><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></>}/>;
const ITrophy=({s=16})=><Ic size={s} d={<><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/></>}/>;
const ICloud=({s=16})=><Ic size={s} d={<><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></>}/>;
const ILink=({s=16})=><Ic size={s} d={<><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></>}/>;
const IFilter=({s=16})=><Ic size={s} d={<><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></>}/>;
const IRefresh=({s=16})=><Ic size={s} d={<><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/></>}/>;

/* ── Constants ── */
const FEE={PAID:"paid",FREE:"free",UNPAID:"unpaid"};
const ST={NORMAL:"normal",CANCEL:"cancel",WAITING:"waiting"};
const FEE_LBL={paid:"Paid",free:"Free",unpaid:"Unpaid"};
const ST_LBL={normal:"Normal",cancel:"Cancelled",waiting:"Waiting"};
const FEE_CLS={paid:"b-paid",free:"b-free",unpaid:"b-unpaid"};
const ST_CLS={normal:"b-normal",cancel:"b-cancel",waiting:"b-waiting"};

/* ── LocalStorage keys (fallback when no Sheet) ── */
const LS={
  GUESTS:"egm3_guests", ROUNDS:"egm3_rounds", FEE:"egm3_fee",
  DIR:"egm3_dir", EVENT:"egm3_event",
  BIN_ID:"egm3_bin_id", API_KEY:"egm3_api_key",
  FINAL:"egm3_final"
};
function lsGet(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

/* ── Helpers ── */
let _eid=Date.now();
function uid(){return String(++_eid);}
function cx(...a){return a.filter(Boolean).join(" ");}
function fmtUSD(n){return "$"+Number(n||0).toLocaleString("en-US",{minimumFractionDigits:0,maximumFractionDigits:2});}
function debounce(fn,ms){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);};}

function sortGuests(guests,rounds){
  const ro={};rounds.forEach((r,i)=>ro[r.id]=i);
  return [...guests].sort((a,b)=>{
    const rank=g=>{
      if(g.status==="normal"&&g.round)return 0;
      if(g.status==="normal"&&!g.round)return 1;
      if(g.status==="waiting")return 2;
      return 3;
    };
    const ra=rank(a),rb=rank(b);
    if(ra!==rb)return ra-rb;
    if(ra===0){const d=(ro[a.round]??99)-(ro[b.round]??99);if(d)return d;}
    return a.memberId.localeCompare(b.memberId,undefined,{numeric:true});
  });
}

function dlCSV(name,rows){
  const csv=rows.map(r=>r.map(c=>{const s=String(c??"");return(s.includes(",")||s.includes('"'))?'"'+s.replace(/"/g,'""')+'"':s;}).join(",")).join("\n");
  const b=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  const u=URL.createObjectURL(b);const a=document.createElement("a");
  a.href=u;a.download=name;document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(u);
}

/* ── Cloud Sync via JSONBin.io ──
   JSONBin is a free REST API with proper CORS — works from any browser.
   No server needed. Data stored as JSON in a private "bin".
   Setup: create free account at jsonbin.io, create a bin, paste the Bin ID + API key in Settings.
── */
async function syncRead(binId, apiKey){
  const res = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, {
    method: "GET",
    headers: {
      "X-Master-Key": apiKey,
      "X-Bin-Meta": "false"
    }
  });
  if(!res.ok) throw new Error("HTTP " + res.status + " — check Bin ID and API key");
  return res.json();
}

async function syncWrite(binId, apiKey, payload){
  const res = await fetch(`https://api.jsonbin.io/v3/b/${binId}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "X-Master-Key": apiKey
    },
    body: JSON.stringify(payload)
  });
  if(!res.ok) throw new Error("HTTP " + res.status + " — check Bin ID and API key");
  return res.json();
}

/* ── App ── */
function App(){
  const [guests,setGuests]=useState(()=>lsGet(LS.GUESTS,[]));
  const [rounds,setRounds]=useState(()=>lsGet(LS.ROUNDS,[{id:"r1",name:"Round 1",limit:20},{id:"r2",name:"Round 2",limit:20}]));
  const [finalRound,setFinalRound]=useState(()=>lsGet(LS.FINAL,{enabled:false,name:"Final",prizePool:[]}));
  const [feeAmt,setFeeAmt]=useState(()=>lsGet(LS.FEE,50));
  const [eventName,setEventName]=useState(()=>lsGet(LS.EVENT,""));
  const [binId,setBinId]=useState(()=>lsGet(LS.BIN_ID,""));
  const [apiKey,setApiKey]=useState(()=>lsGet(LS.API_KEY,""));
  const [syncing,setSyncing]=useState(false);
  const [syncMsg,setSyncMsg]=useState("");
  const [tab,setTab]=useState("overview");
  const [filterTab,setFilterTab]=useState("all");
  const [search,setSearch]=useState("");
  const [roundSearch,setRoundSearch]=useState("");
  const [showForm,setShowForm]=useState(false);
  const [showBulk,setShowBulk]=useState(false);
  const [showFinal,setShowFinal]=useState(false);
  const [editEid,setEditEid]=useState(null);
  const [formErr,setFormErr]=useState("");
  const [form,setForm]=useState(ef());

  const dirRef=useRef(lsGet(LS.DIR,[]));
  const [dirVer,setDirVer]=useState(0);

  /* Persist */
  useEffect(()=>lsSet(LS.GUESTS,guests),[guests]);
  useEffect(()=>lsSet(LS.ROUNDS,rounds),[rounds]);
  useEffect(()=>lsSet(LS.FEE,feeAmt),[feeAmt]);
  useEffect(()=>lsSet(LS.EVENT,eventName),[eventName]);
  useEffect(()=>lsSet(LS.BIN_ID,binId),[binId]);
  useEffect(()=>lsSet(LS.API_KEY,apiKey),[apiKey]);
  useEffect(()=>lsSet(LS.FINAL,finalRound),[finalRound]);

  function ef(){return{memberId:"",name:"",tier:"",feeStatus:"unpaid",round:"",status:"normal",note:""};}

  const dirMap=useMemo(()=>{
    const m={};dirRef.current.forEach(d=>m[d.id]={name:d.name,tier:d.tier||""});return m;
  },[dirVer]);

  /* Cloud sync via JSONBin */
  async function syncToCloud(){
    if(!binId||!apiKey){setSyncMsg("⚠️ No Bin ID / API Key — go to Settings.");return;}
    setSyncing(true);setSyncMsg("Saving…");
    try{
      const payload={eventName,guests,rounds,finalRound,feeAmt,savedAt:new Date().toISOString()};
      await syncWrite(binId,apiKey,payload);
      setSyncMsg("✓ Saved");
    }catch(e){setSyncMsg("✗ "+e.message);}
    setSyncing(false);
    setTimeout(()=>setSyncMsg(""),5000);
  }

  async function syncFromCloud(silent){
    if(!binId||!apiKey)return;
    if(!silent){setSyncing(true);setSyncMsg("Loading…");}
    try{
      const data=await syncRead(binId,apiKey);
      if(data){
        if(data.guests)setGuests(data.guests);
        if(data.rounds)setRounds(data.rounds);
        if(data.finalRound)setFinalRound(data.finalRound);
        if(data.feeAmt!=null)setFeeAmt(data.feeAmt);
        if(data.eventName)setEventName(data.eventName);
        if(!silent)setSyncMsg("✓ Loaded — "+new Date(data.savedAt||Date.now()).toLocaleTimeString());
      }
    }catch(e){if(!silent)setSyncMsg("✗ "+e.message);}
    if(!silent){setSyncing(false);setTimeout(()=>setSyncMsg(""),5000);}
  }

  // Auto-pull on open
  useEffect(()=>{
    if(binId&&apiKey)syncFromCloud(true);
  },[]);

  /* Derived */
  const roundCounts=useMemo(()=>{
    const m={};rounds.forEach(r=>m[r.id]=0);
    guests.forEach(g=>{if(g.status==="normal"&&g.round&&m[g.round]!==undefined)m[g.round]++;});
    return m;
  },[guests,rounds]);

  const stats=useMemo(()=>{
    const active=guests.filter(g=>g.status==="normal");
    const paid=active.filter(g=>g.feeStatus==="paid");
    const free=active.filter(g=>g.feeStatus==="free");
    const unpaid=active.filter(g=>g.feeStatus==="unpaid");
    const assigned=active.filter(g=>g.round);
    const unassigned=active.filter(g=>!g.round);
    const cancelled=guests.filter(g=>g.status==="cancel");
    const waiting=guests.filter(g=>g.status==="waiting");
    return{total:guests.length,active:active.length,
      paid,free,unpaid,assigned,unassigned,cancelled,waiting,
      collected:paid.length*feeAmt};
  },[guests,feeAmt]);

  const sorted=useMemo(()=>sortGuests(guests,rounds),[guests,rounds]);

  const guestsByFilter=useMemo(()=>{
    const q=search.trim().toLowerCase();
    let base;
    switch(filterTab){
      case"paid":base=stats.paid;break;
      case"free":base=stats.free;break;
      case"unpaid":base=stats.unpaid;break;
      case"assigned":base=stats.assigned;break;
      case"unassigned":base=stats.unassigned;break;
      case"cancelled":base=stats.cancelled;break;
      case"waiting":base=stats.waiting;break;
      default:base=sorted;
    }
    if(!q)return base;
    return base.filter(g=>g.memberId.toLowerCase().includes(q)||g.name.toLowerCase().includes(q)||(g.note||"").toLowerCase().includes(q));
  },[sorted,stats,filterTab,search]);

  const roundSearchRes=useMemo(()=>{
    const q=roundSearch.trim().toLowerCase();
    if(!q)return null;
    return guests.filter(g=>g.status==="normal"&&g.round&&(g.memberId.toLowerCase().includes(q)||g.name.toLowerCase().includes(q)));
  },[guests,roundSearch]);

  /* Actions */
  function startAdd(){setForm(ef());setEditEid(null);setFormErr("");setShowForm(true);}
  function startEdit(g){setForm({memberId:g.memberId,name:g.name,tier:g.tier||"",feeStatus:g.feeStatus,round:g.round,status:g.status,note:g.note});setEditEid(g.eid);setFormErr("");setShowForm(true);}

  function roundFull(rid,excl){
    const r=rounds.find(r=>r.id===rid);if(!r)return false;
    return guests.filter(g=>g.round===rid&&g.status==="normal"&&g.eid!==excl).length>=r.limit;
  }
  function memberInRound(mid,rid,excl){
    return guests.some(g=>g.memberId===mid&&g.round===rid&&g.status==="normal"&&g.eid!==excl);
  }

  function onIdChange(id){
    const e=dirMap[id.trim()];
    setForm(f=>({...f,memberId:id,name:e?.name||f.name,tier:e?.tier||f.tier}));
  }

  function saveGuest(){
    const mid=form.memberId.trim(),name=form.name.trim();
    if(!mid)return setFormErr("Enter a Member ID.");
    if(!name)return setFormErr("Enter a name.");
    if(form.status==="normal"&&form.round){
      if(roundFull(form.round,editEid)){const r=rounds.find(r=>r.id===form.round);return setFormErr(`"${r?.name}" is full.`);}
      if(memberInRound(mid,form.round,editEid))return setFormErr(`${mid} is already in this round.`);
    }
    const g={eid:editEid||uid(),memberId:mid,name,tier:form.tier.trim(),
      feeStatus:form.feeStatus,round:form.status==="normal"?form.round:"",
      status:form.status,note:form.note.trim()};
    if(editEid)setGuests(p=>p.map(x=>x.eid===editEid?g:x));
    else setGuests(p=>[...p,g]);
    setShowForm(false);setFormErr("");
  }

  function delGuest(eid){if(confirm("Delete this entry?"))setGuests(p=>p.filter(g=>g.eid!==eid));}
  function upd(eid,patch){setGuests(p=>p.map(g=>g.eid===eid?{...g,...patch}:g));}
  function tryRound(eid,rid){
    const g=guests.find(x=>x.eid===eid);if(!g)return false;
    if(rid){
      if(roundFull(rid,eid)){const r=rounds.find(r=>r.id===rid);alert(`"${r?.name}" is full.`);return false;}
      if(memberInRound(g.memberId,rid,eid)){alert(`${g.memberId} already in this round.`);return false;}
    }
    upd(eid,{round:rid,status:"normal"});return true;
  }
  function setSt(eid,status){const g=guests.find(x=>x.eid===eid);upd(eid,{status,round:status==="normal"?g?.round:""});}

  function exportCSV(){
    const rn=id=>rounds.find(r=>r.id===id)?.name||"";
    dlCSV(`${eventName||"event"}-${new Date().toISOString().slice(0,10)}.csv`,
      [["#","Member ID","Name","Tier","Fee","Round","Status","Note"],
       ...sorted.map((g,i)=>[i+1,g.memberId,g.name,g.tier||"",FEE_LBL[g.feeStatus],g.round?rn(g.round):"",ST_LBL[g.status],g.note||""])]);
  }

  function bulkAdd(lines){
    const created=lines.filter(id=>id.trim()).map(rawId=>{
      const id=rawId.trim();const e=dirMap[id];
      return{eid:uid(),memberId:id,name:e?.name||"(Unknown — edit)",tier:e?.tier||"",feeStatus:"unpaid",round:"",status:"normal",note:""};
    });
    setGuests(p=>[...p,...created]);setShowBulk(false);
  }

  const tp={rounds,onEdit:startEdit,
    onAssign:tryRound,onStatus:setSt,
    onFee:(eid,fs)=>upd(eid,{feeStatus:fs})};

  const FILTER_TABS=[
    ["all","All",stats.total],
    ["paid","Paid",stats.paid.length],
    ["free","Free",stats.free.length],
    ["unpaid","Unpaid",stats.unpaid.length],
    ["assigned","Assigned",stats.assigned.length],
    ["unassigned","Unassigned",stats.unassigned.length],
    ["cancelled","Cancelled",stats.cancelled.length],
    ["waiting","Waiting",stats.waiting.length],
  ];

  return(
    <div className="app">
      <style>{CSS}</style>

      {/* Header */}
      <header className="topbar">
        <div className="brand">
          <div className="bmark">E</div>
          <div>
            <div className="btitle">{eventName||"Event Guest Manager"}</div>
            <div className="bsub">
              {stats.total} entries · {stats.active} active
              {syncMsg&&<span className={cx("smsg",syncMsg.startsWith("✓")?"smsg-ok":syncMsg.startsWith("✗")?"smsg-err":"smsg-info")}>{syncMsg}</span>}
            </div>
          </div>
        </div>
        <div className="hactions">
          {binId&&apiKey&&<>
            <button className="btn btn-ghost btn-xs" onClick={()=>syncFromCloud(false)} disabled={syncing} title="Pull latest data"><IRefresh s={13}/></button>
            <button className="btn btn-ghost btn-xs" onClick={syncToCloud} disabled={syncing} title="Push / save data"><ICloud s={13}/></button>
          </>}
          <button className="btn btn-ghost btn-xs" onClick={exportCSV}><IDL s={13}/></button>
          <button className="btn btn-sec btn-xs" onClick={()=>setShowBulk(true)}><IBulk s={13}/> Bulk</button>
          <button className="btn btn-pri btn-xs" onClick={startAdd}><IPlus s={13}/> Add</button>
        </div>
      </header>

      {/* Nav */}
      <nav className="tabs">
        {[["overview","Overview",<IGrid s={13}/>],["rounds","Rounds",<IUsers s={13}/>],["final","Final",<ITrophy s={13}/>],["settings","Settings",<IGear s={13}/>]].map(([id,lbl,icon])=>(
          <button key={id} className={cx("tab",tab===id&&"tab-on")} onClick={()=>setTab(id)}>{icon}{lbl}</button>
        ))}
      </nav>

      <main className="content">

        {/* ── OVERVIEW ── */}
        {tab==="overview"&&<div className="stack">
          {/* Stats */}
          <div className="sgrid">
            <SC icon={<IUsers s={17}/>} label="Total" value={stats.total}/>
            <SC icon={<ICheck s={17}/>} label="Assigned" value={stats.assigned.length} sub={`of ${stats.active}`}/>
            <SC icon={<IDollar s={17}/>} label="Collected" value={fmtUSD(stats.collected)} sub={`${stats.paid.length} paid`} tone="good"/>
            <SC icon={<IDollar s={17}/>} label="Free" value={stats.free.length}/>
            <SC icon={<IAlert s={17}/>} label="Unpaid" value={stats.unpaid.length} tone={stats.unpaid.length>0?"warn":"def"}/>
            <SC icon={<IClock s={17}/>} label="Unassigned" value={stats.unassigned.length} tone={stats.unassigned.length>0?"warn":"def"}/>
            <SC icon={<IBan s={17}/>} label="Cancelled" value={stats.cancelled.length} tone="danger"/>
            <SC icon={<IClock s={17}/>} label="Waiting" value={stats.waiting.length} tone="neutral"/>
          </div>

          {/* Guest list with filter tabs */}
          <div className="panel">
            <div className="panel-hdr">
              <div className="ftabs">
                {FILTER_TABS.map(([id,lbl,cnt])=>(
                  <button key={id} className={cx("ftab",filterTab===id&&"ftab-on")} onClick={()=>setFilterTab(id)}>
                    {lbl} <span className="ftab-cnt">{cnt}</span>
                  </button>
                ))}
              </div>
              <div className="sbox">
                <ISearch s={13}/>
                <input placeholder="Search…" value={search} onChange={e=>setSearch(e.target.value)}/>
                {search&&<button className="sclear" onClick={()=>setSearch("")}><IX s={12}/></button>}
              </div>
            </div>
            <GuestTable guests={guestsByFilter} onDel={delGuest} {...tp}/>
          </div>
        </div>}

        {/* ── ROUNDS ── */}
        {tab==="rounds"&&<div className="stack">
          <div className="sbox sbox-wide">
            <ISearch s={13}/>
            <input placeholder="Search across all rounds…" value={roundSearch} onChange={e=>setRoundSearch(e.target.value)}/>
            {roundSearch&&<button className="sclear" onClick={()=>setRoundSearch("")}><IX s={12}/></button>}
          </div>
          {roundSearchRes?(
            <div className="panel">
              <div className="panel-hdr"><h2>Results <span className="dim">({roundSearchRes.length})</span></h2></div>
              <GuestTable guests={roundSearchRes} onDel={()=>{}} hideStatus {...tp}/>
            </div>
          ):rounds.length===0?<div className="empty">No rounds. Go to Settings.</div>
          :rounds.map(r=>{
            const rg=guests.filter(g=>g.status==="normal"&&g.round===r.id)
              .sort((a,b)=>a.memberId.localeCompare(b.memberId,undefined,{numeric:true}));
            const cnt=roundCounts[r.id]||0,full=cnt>=r.limit;
            return(
              <div className="panel" key={r.id}>
                <div className="panel-hdr">
                  <h2>{r.name} <span className="dim">({cnt}/{r.limit})</span></h2>
                  {full&&<span className="badge b-unpaid">Full</span>}
                </div>
                <GuestTable guests={rg} onDel={()=>{}} hideRound hideStatus {...tp}/>
              </div>
            );
          })}
        </div>}

        {/* ── FINAL ── */}
        {tab==="final"&&<FinalTab finalRound={finalRound} setFinalRound={setFinalRound} guests={guests} rounds={rounds}/>}

        {/* ── SETTINGS ── */}
        {tab==="settings"&&<SettingsTab
          rounds={rounds} setRounds={setRounds}
          feeAmt={feeAmt} setFeeAmt={setFeeAmt}
          eventName={eventName} setEventName={setEventName}
          binId={binId} setBinId={setBinId} apiKey={apiKey} setApiKey={setApiKey}
          roundCounts={roundCounts}
          dirRef={dirRef} dirVer={dirVer} setDirVer={setDirVer}
        />}
      </main>

      {showForm&&<GuestModal form={form} setForm={setForm} rounds={rounds} err={formErr}
        isEdit={!!editEid} onClose={()=>{setShowForm(false);setFormErr("");}} onSave={saveGuest} onIdChange={onIdChange}/>}
      {showBulk&&<BulkModal onClose={()=>setShowBulk(false)} onSubmit={bulkAdd} dirMap={dirMap}/>}
    </div>
  );
}

/* ── Popover (mobile-friendly bottom sheet on small screens) ── */
function Pop({anchor,onClose,children}){
  const ref=useRef(null);
  const isMobile=window.innerWidth<600;
  useEffect(()=>{
    const fn=e=>{
      if(!isMobile&&ref.current&&!ref.current.contains(e.target)&&!anchor?.current?.contains(e.target))onClose();
    };
    document.addEventListener("mousedown",fn);
    return()=>document.removeEventListener("mousedown",fn);
  },[onClose]);

  if(isMobile){
    return(
      <div className="pop-overlay" onMouseDown={e=>{if(e.target===e.currentTarget)onClose();}}>
        <div className="pop-sheet" ref={ref}>
          <div className="pop-handle"/>
          {children}
        </div>
      </div>
    );
  }
  return <div className="pop-drop" ref={ref}>{children}</div>;
}

/* ── Final Tab ── */
const RANK_OPTIONS=[
  {value:"champion",  label:"🥇 Champion"},
  {value:"runner1",   label:"🥈 Runner-up 1"},
  {value:"runner2",   label:"🥉 Runner-up 2"},
  {value:"place4",    label:"4th Place"},
  {value:"place5",    label:"5th Place"},
  {value:"place6",    label:"6th Place"},
  {value:"place7",    label:"7th Place"},
  {value:"place8",    label:"8th Place"},
  {value:"place9",    label:"9th Place"},
];
const RANK_SORT={champion:1,runner1:2,runner2:3,place4:4,place5:5,place6:6,place7:7,place8:8,place9:9};
const RANK_MEDAL={champion:"🥇",runner1:"🥈",runner2:"🥉"};
const RANK_DISPLAY={champion:"Champion",runner1:"Runner-up 1",runner2:"Runner-up 2",place4:"4th Place",place5:"5th Place",place6:"6th Place",place7:"7th Place",place8:"8th Place",place9:"9th Place"};

function fmtPrize(v){
  if(!v&&v!==0)return"";
  const n=Number(String(v).replace(/[^0-9.]/g,""));
  if(isNaN(n))return String(v);
  return"$"+n.toLocaleString("en-US");
}

function FinalTab({finalRound,setFinalRound,guests}){
  // entries: [{id, memberId, name(auto), rank, prize}]
  const entries=finalRound.entries||[];
  const [newMbId,setNewMbId]=useState("");
  const [newRank,setNewRank]=useState("champion");
  const [newPrize,setNewPrize]=useState("");
  const [addErr,setAddErr]=useState("");

  // auto-fill name from guests list or directory
  function resolveName(mbId){
    const g=guests.find(x=>x.memberId===mbId.trim()&&x.status==="normal");
    return g?g.name:"";
  }

  function toggleEnabled(){setFinalRound(f=>({...f,enabled:!f.enabled}));}

  function addEntry(){
    const mbId=newMbId.trim();
    if(!mbId)return setAddErr("Enter a Member ID.");
    if(entries.some(e=>e.rank===newRank))return setAddErr(`${RANK_DISPLAY[newRank]} already assigned.`);
    const name=resolveName(mbId);
    const entry={id:uid(),memberId:mbId,name,rank:newRank,prize:newPrize.trim()};
    setFinalRound(f=>({...f,entries:[...(f.entries||[]),entry]}));
    setNewMbId("");setNewPrize("");setAddErr("");
  }

  function updEntry(id,patch){
    setFinalRound(f=>({...f,entries:(f.entries||[]).map(e=>e.id===id?{...e,...patch}:e)}));
  }

  function delEntry(id){
    setFinalRound(f=>({...f,entries:(f.entries||[]).filter(e=>e.id!==id)}));
  }

  const sorted=[...entries].sort((a,b)=>(RANK_SORT[a.rank]||99)-(RANK_SORT[b.rank]||99));
  const usedRanks=new Set(entries.map(e=>e.rank));
  const availableRanks=RANK_OPTIONS.filter(o=>!usedRanks.has(o.value)||o.value===newRank);

  return(
    <div className="stack">
      <div className="panel">
        <div className="panel-hdr">
          <h2><ITrophy s={15}/> Final Round</h2>
          <label className="toggle">
            <input type="checkbox" checked={!!finalRound.enabled} onChange={toggleEnabled}/>
            <span className="toggle-slider"/>
            <span className="toggle-lbl">{finalRound.enabled?"Active":"Disabled"}</span>
          </label>
        </div>

        {!finalRound.enabled&&<p className="hint">Enable Final Round to record rankings and prize winners.</p>}

        {finalRound.enabled&&<>
          {/* Add entry form */}
          <div className="panel-section">
            <div className="section-hdr"><span>Add result</span></div>
            {addErr&&<div className="ferr ferr-sm"><IAlert s={13}/>{addErr}</div>}
            <div className="final-form">
              <div className="final-field">
                <label>Member ID</label>
                <input className="input" placeholder="MB001" value={newMbId}
                  onChange={e=>{setNewMbId(e.target.value);setAddErr("");}}
                  onBlur={e=>{
                    const name=resolveName(e.target.value);
                    if(name)setAddErr("");
                  }}
                />
                {newMbId&&resolveName(newMbId)&&(
                  <div className="autofill-name">{resolveName(newMbId)}</div>
                )}
              </div>
              <div className="final-field">
                <label>Rank</label>
                <select className="input" value={newRank} onChange={e=>setNewRank(e.target.value)}>
                  {RANK_OPTIONS.map(o=>(
                    <option key={o.value} value={o.value} disabled={usedRanks.has(o.value)}>
                      {o.label}{usedRanks.has(o.value)?" (taken)":""}
                    </option>
                  ))}
                </select>
              </div>
              <div className="final-field">
                <label>Prize (USD)</label>
                <div className="fee-wrap">
                  <span className="fee-pre">$</span>
                  <input className="input fee-inp" placeholder="10,000" value={newPrize}
                    onChange={e=>setNewPrize(e.target.value)}/>
                </div>
              </div>
              <button className="btn btn-pri btn-xs final-add-btn" onClick={addEntry}>
                <IPlus s={13}/> Add
              </button>
            </div>
          </div>

          {/* Results board */}
          <div className="panel-section">
            <div className="section-hdr"><span>Results board</span></div>
            {sorted.length===0&&<p className="hint">No results yet. Add winners above.</p>}
            {sorted.map(e=>(
              <div className="final-result-row" key={e.id}>
                {/* Rank medal + label */}
                <div className="frr-rank">
                  <span className="frr-medal">{RANK_MEDAL[e.rank]||<span className="frr-num">#{RANK_SORT[e.rank]}</span>}</span>
                  <span className="frr-rank-lbl">{RANK_DISPLAY[e.rank]}</span>
                </div>

                {/* MB# */}
                <div className="frr-id">
                  <label>MB#</label>
                  <input className="input frr-input" value={e.memberId}
                    onChange={ev=>updEntry(e.id,{memberId:ev.target.value,name:resolveName(ev.target.value)||e.name})}/>
                </div>

                {/* Name (auto or manual) */}
                <div className="frr-name">
                  <label>Name</label>
                  <input className="input frr-input" value={e.name}
                    onChange={ev=>updEntry(e.id,{name:ev.target.value})}
                    placeholder="Auto-filled"/>
                </div>

                {/* Prize */}
                <div className="frr-prize">
                  <label>Prize</label>
                  <div className="fee-wrap">
                    <span className="fee-pre">$</span>
                    <input className="input fee-inp" value={e.prize}
                      onChange={ev=>updEntry(e.id,{prize:ev.target.value})}
                      placeholder="10,000"/>
                  </div>
                </div>

                <button className="ib ib-d" onClick={()=>delEntry(e.id)}><ITrash s={13}/></button>
              </div>
            ))}
          </div>

          {/* Display card — final summary */}
          {sorted.length>0&&(
            <div className="panel-section">
              <div className="section-hdr"><span>Prize presentation</span></div>
              <div className="prize-card">
                <div className="prize-card-title">{finalRound.name||"Final Results"}</div>
                {sorted.map(e=>(
                  <div className="prize-card-row" key={e.id}>
                    <div className="pcr-left">
                      <span className="pcr-medal">{RANK_MEDAL[e.rank]||""}</span>
                      <div className="pcr-info">
                        <span className="pcr-mb">{e.memberId}</span>
                        <span className="pcr-name">{e.name||"—"}</span>
                        <span className="pcr-rank-lbl">{RANK_DISPLAY[e.rank]}</span>
                      </div>
                    </div>
                    {e.prize&&<div className="pcr-prize">{fmtPrize(e.prize)}</div>}
                  </div>
                ))}
              </div>
            </div>
          )}
        </>}
      </div>
    </div>
  );
}

/* ── Settings Tab ── */
const DPAGE=50;
function SettingsTab({rounds,setRounds,feeAmt,setFeeAmt,eventName,setEventName,binId,setBinId,apiKey,setApiKey,roundCounts,dirRef,dirVer,setDirVer}){
  const [df,setDf]=useState({id:"",name:"",tier:""});
  const [dfErr,setDfErr]=useState("");
  const [bulk,setBulk]=useState("");
  const [dsearch,setDsearch]=useState("");
  const [dpage,setDpage]=useState(0);
  const dbSearch=useRef(debounce(v=>{setDsearch(v);setDpage(0);},250));

  const dir=dirRef.current;
  const dirFilt=useMemo(()=>{
    const q=dsearch.trim().toLowerCase();
    if(!q)return dir;
    return dir.filter(d=>d.id.toLowerCase().includes(q)||d.name.toLowerCase().includes(q)||(d.tier||"").toLowerCase().includes(q));
  },[dirVer,dsearch]);
  const dItems=useMemo(()=>dirFilt.slice(dpage*DPAGE,(dpage+1)*DPAGE),[dirFilt,dpage]);
  const dPages=Math.ceil(dirFilt.length/DPAGE);

  function addEntry(){
    const id=df.id.trim(),name=df.name.trim();
    if(!id||!name)return setDfErr("Enter ID and name.");
    if(dir.some(d=>d.id===id))return setDfErr(`"${id}" already exists.`);
    dirRef.current=[...dir,{id,name,tier:df.tier.trim()}];
    lsSet(LS.DIR,dirRef.current);setDirVer(v=>v+1);
    setDf({id:"",name:"",tier:""});setDfErr("");
  }
  function delEntry(id){dirRef.current=dir.filter(d=>d.id!==id);lsSet(LS.DIR,dirRef.current);setDirVer(v=>v+1);}
  function importBulk(){
    const ex=new Set(dir.map(d=>d.id));const adds=[];
    bulk.split("\n").forEach(line=>{
      const p=line.split(",");
      const id=(p[0]||"").trim(),name=(p[1]||"").trim(),tier=(p[2]||"").trim();
      if(!id||!name||ex.has(id))return;ex.add(id);adds.push({id,name,tier});
    });
    if(adds.length){dirRef.current=[...dir,...adds];lsSet(LS.DIR,dirRef.current);setDirVer(v=>v+1);setBulk("");}
  }
  function addRound(){setRounds(p=>[...p,{id:"r_"+Date.now().toString(36).slice(-5),name:`Round ${p.length+1}`,limit:20}]);}
  function updRName(id,v){setRounds(p=>p.map(r=>r.id===id?{...r,name:v}:r));}
  function updRLim(id,v){setRounds(p=>p.map(r=>r.id===id?{...r,limit:Math.max(0,v)}:r));}
  function delRound(id){
    if(guests&&guests.some(g=>g.round===id&&g.status==="normal"))return alert("Round has guests. Move them first.");
    setRounds(p=>p.filter(r=>r.id!==id));
  }
  function clearAll(){
    if(confirm("Delete ALL data permanently?")){{Object.values(LS).forEach(k=>localStorage.removeItem(k));window.location.reload();}}
  }

  return(
    <div className="stack">
      {/* Event info */}
      <div className="panel">
        <div className="panel-hdr"><h2>Event</h2></div>
        <div className="settings-row">
          <label>Event name</label>
          <input className="input" value={eventName} onChange={e=>setEventName(e.target.value)} placeholder="e.g. Poker Night June 2025" style={{maxWidth:260}}/>
        </div>
        <p className="hint">Shown in the header and used as the CSV filename.</p>
      </div>

      {/* Sync */}
      <div className="panel">
        <div className="panel-hdr"><h2><ICloud s={14}/> Cloud sync (JSONBin)</h2></div>
        <p className="hint">
          Sync data across desktop &amp; mobile using <strong>JSONBin.io</strong> (free, no install needed).
          Setup takes ~2 minutes. <a href="#jb-guide" style={{color:"var(--acc)"}}>Setup guide ↓</a>
        </p>
        <div className="settings-row" style={{flexWrap:"wrap",gap:8}}>
          <label style={{minWidth:80}}>Bin ID</label>
          <input className="input" value={binId} onChange={e=>setBinId(e.target.value.trim())}
            placeholder="e.g. 64a3f1c8acd3cb34a8…" style={{maxWidth:300,fontSize:12}}/>
        </div>
        <div className="settings-row" style={{flexWrap:"wrap",gap:8}}>
          <label style={{minWidth:80}}>API Key</label>
          <input className="input" value={apiKey} onChange={e=>setApiKey(e.target.value.trim())}
            placeholder="$2a$10$…" style={{maxWidth:300,fontSize:12}}/>
        </div>
        <div style={{padding:"0 13px 13px",display:"flex",gap:8,flexWrap:"wrap"}}>
          {binId&&apiKey&&<>
            <button className="btn btn-sec btn-xs" onClick={()=>syncFromCloud(false)} disabled={syncing}>
              <IRefresh s={13}/> Pull latest
            </button>
            <button className="btn btn-pri btn-xs" onClick={syncToCloud} disabled={syncing}>
              <ICloud s={13}/> Push / save
            </button>
          </>}
          {(!binId||!apiKey)&&<p style={{fontSize:12,color:"var(--warn)",margin:0}}>⚠️ Enter both Bin ID and API Key above, then push/pull.</p>}
        </div>
        <div className="sheet-guide" id="jb-guide">
          <div className="guide-title">📋 Setup guide (one-time, ~2 min)</div>
          <ol className="guide-steps">
            <li>Go to <a href="https://jsonbin.io" target="_blank" style={{color:"var(--acc)"}}>jsonbin.io</a> → click <strong>Sign Up</strong> (free).</li>
            <li>After login, go to <strong>API Keys</strong> (top menu) → copy your <strong>Secret Key</strong> → paste into <em>API Key</em> above.</li>
            <li>Click <strong>Bins → Create Bin</strong> → paste <code>{"{}"}</code> as content → Save. Copy the <strong>Bin ID</strong> from the URL → paste into <em>Bin ID</em> above.</li>
            <li>Click <strong>↑ Push / save</strong> to upload your current data.</li>
            <li>On any other device: open the app, go to Settings, enter the same Bin ID + API Key → click <strong>↓ Pull latest</strong>. Done — data synced!</li>
            <li>💡 The app auto-pulls on startup if Bin ID + API Key are saved.</li>
          </ol>
        </div>
      </div>

      {/* Fee */}
      <div className="panel">
        <div className="panel-hdr"><h2>Registration fee</h2></div>
        <div className="settings-row">
          <label>Fee per entry (USD)</label>
          <div className="fee-wrap">
            <span className="fee-pre">$</span>
            <input type="number" className="input fee-inp" value={feeAmt} min={0} step={1} onChange={e=>setFeeAmt(Number(e.target.value)||0)}/>
          </div>
        </div>
        <p className="hint">Total collected = Paid entries × this fee.</p>
      </div>

      {/* Rounds */}
      <div className="panel">
        <div className="panel-hdr"><h2>Rounds</h2><button className="btn btn-sec btn-xs" onClick={addRound}><IPlus s={13}/> Add</button></div>
        <div className="rlist">
          {rounds.map(r=>(
            <div className="rrow" key={r.id}>
              <input className="input rname" value={r.name} onChange={e=>updRName(r.id,e.target.value)}/>
              <div className="rlim"><label>Limit</label><input type="number" className="input rlim-inp" value={r.limit} min={0} onChange={e=>updRLim(r.id,Number(e.target.value)||0)}/></div>
              <div className="rocc dim">{roundCounts[r.id]||0}/{r.limit}</div>
              <button className="ib ib-d" onClick={()=>delRound(r.id)}><ITrash s={13}/></button>
            </div>
          ))}
          {!rounds.length&&<div className="empty">No rounds.</div>}
        </div>
      </div>

      {/* Directory */}
      <div className="panel">
        <div className="panel-hdr"><h2>Member directory <span className="dim">({dir.length})</span></h2></div>
        <p className="hint">ID → Name + Tier. Auto-fills when adding guests by ID.</p>
        <div className="dir-add">
          {dfErr&&<div className="ferr ferr-sm"><IAlert s={13}/>{dfErr}</div>}
          <div className="dir-fields">
            <input className="input" placeholder="ID" value={df.id} onChange={e=>setDf({...df,id:e.target.value})}/>
            <input className="input" placeholder="Name" value={df.name} onChange={e=>setDf({...df,name:e.target.value})}/>
            <input className="input" placeholder="Tier" value={df.tier} onChange={e=>setDf({...df,tier:e.target.value})}/>
            <button className="btn btn-sec btn-xs" onClick={addEntry}><IPlus s={13}/></button>
          </div>
        </div>
        <div className="dir-bulk">
          <div className="bulk-lbl">Bulk import — <code>ID, Name, Tier</code> per line (Tier optional)</div>
          <textarea className="input" rows={3} value={bulk} onChange={e=>setBulk(e.target.value)}
            placeholder={"MB001, Nguyen Van A, Gold\nMB002, Tran Thi B"}/>
          <button className="btn btn-sec btn-xs" style={{alignSelf:"flex-start"}} onClick={importBulk} disabled={!bulk.trim()}><IBulk s={13}/> Import</button>
        </div>
        <div className="dir-search">
          <div className="sbox"><ISearch s={13}/><input placeholder="Search directory…" onChange={e=>dbSearch.current(e.target.value)}/></div>
          <span className="dim">{dirFilt.length} result(s)</span>
        </div>
        <div className="tw">
          {dItems.length===0?<div className="empty">No entries.</div>:(
            <table className="tbl">
              <thead><tr><th>ID</th><th>Name</th><th>Tier</th><th/></tr></thead>
              <tbody>{dItems.map(d=>(
                <tr key={d.id}>
                  <td className="mono">{d.id}</td><td className="namec">{d.name}</td>
                  <td>{d.tier?<span className="tbadge">{d.tier}</span>:<span className="dim">—</span>}</td>
                  <td className="actc"><button className="ib ib-d" onClick={()=>delEntry(d.id)}><ITrash s={13}/></button></td>
                </tr>
              ))}</tbody>
            </table>
          )}
        </div>
        {dPages>1&&<div className="pagination">
          <button className="btn btn-ghost btn-xs" disabled={dpage===0} onClick={()=>setDpage(p=>p-1)}>← Prev</button>
          <span className="dim">{dpage+1}/{dPages}</span>
          <button className="btn btn-ghost btn-xs" disabled={dpage>=dPages-1} onClick={()=>setDpage(p=>p+1)}>Next →</button>
        </div>}
      </div>

      {/* Danger */}
      <div className="panel panel-danger">
        <div className="panel-hdr"><h2 style={{color:"var(--danger)"}}>Danger zone</h2></div>
        <div className="settings-row">
          <div><div style={{fontWeight:600,fontSize:13}}>Clear all data</div><div className="dim" style={{fontSize:12}}>Permanently delete everything.</div></div>
          <button className="btn btn-xs" style={{background:"var(--danger)",color:"#fff"}} onClick={clearAll}>Clear all</button>
        </div>
      </div>
    </div>
  );
}

/* ── Guest Modal ── */
function GuestModal({form,setForm,rounds,err,isEdit,onClose,onSave,onIdChange}){
  return(
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal">
        <div className="modal-hdr">
          <h3>{isEdit?"Edit entry":"Add guest"}</h3>
          <button className="ib" onClick={onClose}><IX s={16}/></button>
        </div>
        <div className="modal-body">
          {err&&<div className="ferr"><IAlert s={13}/>{err}</div>}
          <div className="fgrid">
            <div className="field"><label>Member ID *</label>
              <input className="input" value={form.memberId} disabled={isEdit} onChange={e=>onIdChange(e.target.value)} placeholder="MB001"/>
            </div>
            <div className="field"><label>Name *</label>
              <input className="input" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Auto-filled"/>
            </div>
            <div className="field"><label>Tier</label>
              <input className="input" value={form.tier} onChange={e=>setForm({...form,tier:e.target.value})} placeholder="Auto-filled"/>
            </div>
            <div className="field"><label>Fee</label>
              <select className="input" value={form.feeStatus} onChange={e=>setForm({...form,feeStatus:e.target.value})}>
                <option value="paid">✓ Paid</option><option value="free">◎ Free</option><option value="unpaid">✗ Unpaid</option>
              </select>
            </div>
            <div className="field"><label>Status</label>
              <select className="input" value={form.status} onChange={e=>setForm({...form,status:e.target.value})}>
                <option value="normal">Normal</option><option value="cancel">Cancelled</option><option value="waiting">Waiting</option>
              </select>
            </div>
            <div className="field"><label>Round</label>
              <select className="input" value={form.round} disabled={form.status!=="normal"} onChange={e=>setForm({...form,round:e.target.value})}>
                <option value="">— Unassigned —</option>
                {rounds.map(r=><option key={r.id} value={r.id}>{r.name}</option>)}
              </select>
            </div>
            <div className="field field-full"><label>Note</label>
              <textarea className="input" rows={2} value={form.note} onChange={e=>setForm({...form,note:e.target.value})} placeholder="Re-join reason, note…"/>
            </div>
          </div>
        </div>
        <div className="modal-ftr">
          <button className="btn btn-ghost btn-xs" onClick={onClose}>Cancel</button>
          <button className="btn btn-pri btn-xs" onClick={onSave}><ISave s={13}/>{isEdit?"Save":"Add guest"}</button>
        </div>
      </div>
    </div>
  );
}

/* ── Bulk Modal ── */
function BulkModal({onClose,onSubmit,dirMap}){
  const [text,setText]=useState("");
  const lines=text.split(/[\n,]/).map(l=>l.trim()).filter(Boolean);
  const prev=lines.slice(0,6);
  return(
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal">
        <div className="modal-hdr"><h3>Bulk add</h3><button className="ib" onClick={onClose}><IX s={16}/></button></div>
        <div className="modal-body">
          <div className="field"><label>Paste IDs — one per line or comma-separated</label>
            <textarea className="input" rows={6} autoFocus value={text} onChange={e=>setText(e.target.value)} placeholder={"MB001\nMB002\nMB003"}/>
          </div>
          <p className="hint">{lines.length} ID(s). Names/Tiers auto-filled. Same ID can appear multiple times (re-join). All start Normal/Unpaid/Unassigned.</p>
          {prev.length>0&&<div className="bprev">
            {prev.map((id,i)=>(
              <div className="brow" key={i}>
                <span className="mono">{id}</span>
                <span className={dirMap[id]?"":"dim"}>{dirMap[id]?.name||"Not in directory"}</span>
                {dirMap[id]?.tier&&<span className="tbadge">{dirMap[id].tier}</span>}
              </div>
            ))}
            {lines.length>6&&<div className="dim" style={{textAlign:"center",fontSize:11}}>+{lines.length-6} more</div>}
          </div>}
        </div>
        <div className="modal-ftr">
          <button className="btn btn-ghost btn-xs" onClick={onClose}>Cancel</button>
          <button className="btn btn-pri btn-xs" disabled={!lines.length} onClick={()=>onSubmit(lines)}><IBulk s={13}/>Add {lines.length||""}</button>
        </div>
      </div>
    </div>
  );
}

/* ══ CSS ══ */
const CSS=`
:root{
  --ink:#1a1918;--ink-s:#58534e;
  --paper:#f7f6f3;--card:#fff;
  --line:#e4dfd7;
  --acc:#b55327;--acc-s:#f3e1d4;
  --good:#2d6949;--good-s:#dff0e8;
  --warn:#936418;--warn-s:#faefd6;
  --danger:#9e3830;--danger-s:#f5e0de;
  --neutral:#58534e;--neu-s:#eae7e2;
  --r:10px;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
.app{background:var(--paper);color:var(--ink);min-height:100vh;font-size:14px;line-height:1.5;}

/* ── topbar ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--line);background:var(--card);gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:20;}
.brand{display:flex;align-items:center;gap:10px;min-width:0;}
.bmark{width:30px;height:30px;border-radius:7px;background:var(--acc);color:#fff;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;font-weight:700;font-size:15px;flex-shrink:0;}
.btitle{font-weight:700;font-size:13.5px;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px;}
.bsub{font-size:11px;color:var(--ink-s);display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.smsg{font-size:10.5px;padding:1px 7px;border-radius:999px;font-weight:600;}
.smsg-ok{background:var(--good-s);color:var(--good);}
.smsg-err{background:var(--danger-s);color:var(--danger);}
.smsg-info{background:var(--neu-s);color:var(--neutral);}
.hactions{display:flex;gap:5px;flex-shrink:0;}

/* ── tabs ── */
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--line);overflow-x:auto;position:sticky;top:57px;z-index:19;}
.tab{display:flex;align-items:center;gap:4px;background:none;border:none;padding:10px 13px;font-size:12.5px;font-weight:600;color:var(--ink-s);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-family:inherit;}
.tab:hover{color:var(--ink);}
.tab-on{color:var(--acc);border-bottom-color:var(--acc);}

/* ── content ── */
.content{padding:14px;max-width:900px;margin:0 auto;}
.stack{display:flex;flex-direction:column;gap:12px;}

/* ── stat grid ── */
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
@media(max-width:560px){.sgrid{grid-template-columns:repeat(2,1fr);}}
.sc{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:11px 13px;}
.sc-icon{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;margin-bottom:5px;background:var(--neu-s);color:var(--ink-s);}
.sc-good .sc-icon{background:var(--good-s);color:var(--good);}
.sc-warn .sc-icon{background:var(--warn-s);color:var(--warn);}
.sc-danger .sc-icon{background:var(--danger-s);color:var(--danger);}
.sc-neutral .sc-icon{background:var(--neu-s);color:var(--neutral);}
.sc-val{font-size:17px;font-weight:700;letter-spacing:-.01em;}
.sc-lbl{font-size:10.5px;color:var(--ink-s);margin-top:1px;}
.sc-sub{font-size:10px;color:var(--ink-s);margin-top:2px;}

/* ── panel ── */
.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:visible;}
.panel-danger{border-color:#f0cfcc;}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;border-bottom:1px solid var(--line);gap:8px;flex-wrap:wrap;}
.panel-hdr h2{font-size:13px;font-weight:700;margin:0;display:flex;align-items:center;gap:6px;}
.panel-section{border-top:1px solid var(--line);padding:12px 13px;}
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;font-size:12px;font-weight:700;color:var(--ink-s);}

/* ── filter tabs ── */
.ftabs{display:flex;gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch;flex:1;min-width:0;}
.ftab{background:none;border:none;padding:8px 10px;font-size:11.5px;font-weight:600;color:var(--ink-s);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;font-family:inherit;}
.ftab:hover{color:var(--ink);}
.ftab-on{color:var(--acc);border-bottom-color:var(--acc);}
.ftab-cnt{background:var(--neu-s);color:var(--ink-s);font-size:10px;padding:0 5px;border-radius:999px;margin-left:3px;}

/* ── search ── */
.sbox{display:flex;align-items:center;gap:6px;background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:7px 10px;color:var(--ink-s);}
.sbox input{border:none;background:none;outline:none;font-size:13px;color:var(--ink);flex:1;min-width:0;font-family:inherit;}
.sbox-wide{padding:10px 13px;font-size:13.5px;}
.sclear{background:none;border:none;cursor:pointer;color:var(--ink-s);display:flex;padding:0;}

/* ── table ── */
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tbl{width:100%;border-collapse:collapse;font-size:12.5px;}
.tbl th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-s);padding:8px 11px;border-bottom:1px solid var(--line);background:var(--paper);white-space:nowrap;}
.tbl td{padding:7px 11px;border-bottom:1px solid var(--line);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover{background:rgba(0,0,0,.012);}
.mono{font-family:ui-monospace,'SF Mono',Consolas,monospace;font-size:11.5px;color:var(--ink-s);}
.namec{font-weight:600;}
.notec{color:var(--ink-s);max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.actc{display:flex;gap:3px;justify-content:flex-end;}
.dim{color:#aaa9a5;}

/* ── badges ── */
.badge{display:inline-flex;align-items:center;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px;white-space:nowrap;}
.b-paid{background:var(--good-s);color:var(--good);}
.b-free{background:#dde4f5;color:#2d4492;}
.b-unpaid{background:var(--warn-s);color:var(--warn);}
.b-normal{background:var(--neu-s);color:var(--neutral);}
.b-cancel{background:var(--danger-s);color:var(--danger);}
.b-waiting{background:#ede0f7;color:#5f2d91;}
.b-rnd{background:var(--neu-s);color:var(--ink-s);}
.b-unassigned{background:var(--paper);color:#ccc8c3;border:1px dashed var(--line);}
.tbadge{font-size:10.5px;font-weight:700;color:var(--acc);background:var(--acc-s);padding:1px 7px;border-radius:999px;}

/* ── click-to-edit badges ── */
.bc{position:relative;display:inline-block;}
.bb{border:none;cursor:pointer;font-family:inherit;border-radius:999px;padding:2px 8px;font-size:10.5px;font-weight:700;}
.bb:disabled{cursor:not-allowed;opacity:.65;}
.bb:not(:disabled):hover{filter:brightness(.91);box-shadow:0 0 0 2px rgba(0,0,0,.07);}

/* ── popover dropdown (desktop) ── */
.pop-drop{position:absolute;top:calc(100% + 5px);left:0;z-index:40;background:var(--card);border:1px solid var(--line);border-radius:10px;box-shadow:0 8px 28px rgba(0,0,0,.14);padding:6px;min-width:150px;display:flex;flex-direction:column;gap:2px;}

/* ── popover bottom sheet (mobile) ── */
.pop-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;display:flex;align-items:flex-end;}
.pop-sheet{background:var(--card);border-radius:16px 16px 0 0;width:100%;padding:0 0 24px;max-height:60vh;overflow-y:auto;}
.pop-handle{width:36px;height:4px;background:var(--line);border-radius:2px;margin:10px auto 8px;}
.pop-title{font-size:11px;font-weight:700;color:var(--ink-s);text-transform:uppercase;letter-spacing:.06em;padding:6px 14px 4px;}

/* ── popover items ── */
.pi{display:flex;align-items:center;gap:8px;background:none;border:none;text-align:left;padding:10px 14px;cursor:pointer;font-size:13px;font-weight:600;color:var(--ink);width:100%;font-family:inherit;}
.pi:hover{background:var(--paper);}
.pi-on{background:var(--acc-s);}

/* ── misc ── */
.empty{padding:22px;text-align:center;color:var(--ink-s);font-size:12.5px;}
.hint{font-size:11.5px;color:var(--ink-s);padding:0 13px 11px;margin:0;}

/* ── buttons ── */
.btn{display:inline-flex;align-items:center;gap:4px;font-size:13px;font-weight:600;padding:8px 13px;border-radius:8px;border:1px solid transparent;cursor:pointer;white-space:nowrap;font-family:inherit;transition:filter .12s;}
.btn-xs{padding:6px 11px;font-size:12px;}
.btn:hover{filter:brightness(.95);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-pri{background:var(--acc);color:#fff;}
.btn-sec{background:var(--acc-s);color:var(--acc);}
.btn-ghost{background:none;color:var(--ink-s);border-color:var(--line);}
.ib{width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);background:var(--card);border-radius:7px;cursor:pointer;color:var(--ink-s);}
.ib:hover{background:var(--neu-s);color:var(--ink);}
.ib-d:hover{background:var(--danger-s);color:var(--danger);border-color:var(--danger-s);}

/* ── settings ── */
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;gap:10px;flex-wrap:wrap;}
.settings-row label{font-size:12.5px;font-weight:600;color:var(--ink-s);}
.fee-wrap{display:flex;align-items:stretch;border:1px solid var(--line);border-radius:7px;overflow:hidden;background:var(--paper);}
.fee-pre{padding:0 8px;color:var(--ink-s);font-weight:700;font-size:14px;background:var(--neu-s);display:flex;align-items:center;border-right:1px solid var(--line);}
.fee-inp{border:none!important;border-radius:0!important;width:110px;}
.rlist{display:flex;flex-direction:column;}
.rrow{display:flex;align-items:center;gap:8px;padding:10px 13px;border-bottom:1px solid var(--line);flex-wrap:wrap;}
.rrow:last-child{border-bottom:none;}
.rname{flex:1;min-width:100px;}
.rlim{display:flex;align-items:center;gap:5px;}
.rlim label{font-size:11.5px;color:var(--ink-s);}
.rlim-inp{width:60px;}
.rocc{font-size:11.5px;min-width:50px;}
.dir-add{padding:0 13px 12px;}
.dir-fields{display:flex;gap:6px;flex-wrap:wrap;}
.dir-fields .input{flex:1;min-width:100px;}
.dir-bulk{padding:0 13px 13px;border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:6px;}
.bulk-lbl{font-size:11px;font-weight:700;color:var(--ink-s);}
.bulk-lbl code{background:var(--neu-s);padding:1px 5px;border-radius:4px;font-size:10.5px;}
.dir-search{display:flex;align-items:center;gap:8px;padding:9px 13px;border-bottom:1px solid var(--line);}
.pagination{display:flex;align-items:center;justify-content:center;gap:10px;padding:10px 13px;border-top:1px solid var(--line);}

/* ── Google Sheet guide ── */
.sheet-guide{margin:0 13px 13px;border:1px solid var(--line);border-radius:8px;padding:12px 14px;background:var(--paper);}
.guide-title{font-size:12.5px;font-weight:700;margin-bottom:8px;}
.guide-steps{margin:0 0 10px 0;padding-left:18px;font-size:12px;color:var(--ink-s);display:flex;flex-direction:column;gap:5px;}
.guide-steps a{color:var(--acc);}
.guide-steps code{background:var(--neu-s);padding:1px 5px;border-radius:4px;font-size:11px;}
.code-block{background:#1e1e1e;border-radius:7px;padding:12px;overflow-x:auto;}
.code-block pre{margin:0;font-size:10.5px;color:#d4d4d4;font-family:ui-monospace,'SF Mono',Consolas,monospace;line-height:1.6;white-space:pre;}

/* ── final round ── */
.toggle{display:flex;align-items:center;gap:8px;cursor:pointer;}
.toggle input{display:none;}
.toggle-slider{width:36px;height:20px;background:var(--line);border-radius:10px;position:relative;transition:background .2s;}
.toggle-slider::after{content:"";position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.toggle input:checked+.toggle-slider{background:var(--acc);}
.toggle input:checked+.toggle-slider::after{transform:translateX(16px);}
.toggle-lbl{font-size:12px;font-weight:600;color:var(--ink-s);}
.prize-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px dashed var(--line);flex-wrap:wrap;}
.prize-rank{font-size:12px;font-weight:700;color:var(--ink-s);min-width:24px;}
.winner-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);flex-wrap:wrap;}
.winner-row:last-child{border-bottom:none;}
.winner-rank{display:flex;align-items:center;gap:8px;min-width:140px;}
.rank-medal{font-size:18px;}
.rank-label{font-size:12px;font-weight:700;}
.rank-amt{font-size:11px;color:var(--ink-s);}
.winner-select{flex:1;min-width:180px;}
.winner-badge{display:flex;align-items:center;gap:6px;}
.result-list{display:flex;flex-direction:column;gap:8px;}
.result-row{display:flex;align-items:center;gap:8px;font-size:13px;}
.prize-amt{font-size:11.5px;font-weight:700;color:var(--good);background:var(--good-s);padding:1px 8px;border-radius:999px;margin-left:auto;}

/* ── input ── */
.input{font-size:13.5px;padding:8px 10px;border-radius:7px;border:1px solid var(--line);background:var(--paper);color:var(--ink);width:100%;outline:none;font-family:inherit;}
.input:focus{border-color:var(--acc);}
.input:disabled{opacity:.55;cursor:not-allowed;}
@media(max-width:480px){.input{font-size:16px;}} /* prevent iOS zoom */

/* ── modal ── */
.overlay{position:fixed;inset:0;background:rgba(20,18,16,.5);display:flex;align-items:flex-end;z-index:50;}
@media(min-width:560px){.overlay{align-items:center;padding:16px;}}
.modal{background:var(--card);border-radius:16px 16px 0 0;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;box-shadow:0 -4px 40px rgba(0,0,0,.2);}
@media(min-width:560px){.modal{border-radius:13px;margin:auto;box-shadow:0 20px 50px rgba(0,0,0,.22);}}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 15px 11px;border-bottom:1px solid var(--line);}
.modal-hdr h3{margin:0;font-size:14.5px;font-weight:700;}
.modal-body{padding:14px 15px;}
.ferr{display:flex;align-items:center;gap:6px;background:var(--danger-s);color:var(--danger);font-size:12px;font-weight:600;padding:8px 11px;border-radius:8px;margin-bottom:11px;}
.ferr-sm{margin-bottom:8px;}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:420px){.fgrid{grid-template-columns:1fr;}}
.field{display:flex;flex-direction:column;gap:4px;}
.field-full{grid-column:1/-1;}
.field label{font-size:11px;font-weight:700;color:var(--ink-s);}
.modal-ftr{display:flex;justify-content:flex-end;gap:7px;padding:11px 15px;border-top:1px solid var(--line);}

/* ── bulk preview ── */
.bprev{border:1px solid var(--line);border-radius:8px;padding:7px 10px;margin-top:4px;display:flex;flex-direction:column;gap:3px;max-height:140px;overflow-y:auto;}
.brow{display:flex;align-items:center;gap:8px;font-size:11.5px;}
.bname{flex:1;}
`;

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
